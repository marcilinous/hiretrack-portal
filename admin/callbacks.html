<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Callbacks — HireTrack Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;}
.topbar{background:#0f172a;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.logo{color:#fff;font-size:1.2rem;font-weight:800;text-decoration:none;}
.logo span{color:#3b82f6;}
.nav{display:flex;gap:1rem;align-items:center;}
.nav a{color:#94a3b8;font-size:0.85rem;text-decoration:none;padding:0.4rem 0.8rem;border-radius:6px;}
.nav a:hover{background:rgba(255,255,255,0.1);color:#fff;}
.nav a.active{color:#fff;background:rgba(59,130,246,0.2);}
.wrap{max-width:1100px;margin:2rem auto;padding:0 1rem;}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.hd h1{font-size:1.4rem;font-weight:800;}
.hd span{font-size:0.83rem;color:#64748b;}
.card{background:#fff;border-radius:12px;border:1.5px solid #e2e8f0;overflow:hidden;}
.search{padding:1rem;border-bottom:1px solid #e2e8f0;}
.search input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:0.55rem 0.9rem;font-size:0.88rem;outline:none;font-family:inherit;}
.search input:focus{border-color:#3b82f6;}
table{width:100%;border-collapse:collapse;}
th{background:#f8fafc;padding:0.75rem 1rem;text-align:left;font-size:0.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #e2e8f0;}
td{padding:0.85rem 1rem;font-size:0.85rem;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8fafc;}
.badge{font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;}
.b-orange{background:#ffedd5;color:#c2410c;}
.b-blue{background:#dbeafe;color:#1d4ed8;}
.b-green{background:#dcfce7;color:#15803d;}
select{border:1px solid #e2e8f0;border-radius:6px;padding:4px 8px;font-size:0.78rem;outline:none;font-family:inherit;}
.empty,.loading{text-align:center;padding:3rem;color:#94a3b8;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:#fff;padding:0.75rem 1.2rem;border-radius:10px;font-size:0.88rem;font-weight:600;z-index:999;display:none;}
</style>
</head>
<body>
<div class="topbar">
  <a href="/admin/dashboard.html" class="logo">Hire<span>Track</span></a>
  <div class="nav">
    <a href="/admin/dashboard.html">Overview</a>
    <a href="/admin/callbacks.html" class="active">📞 Callbacks</a>
    <a href="/admin/executives.html">🎯 Executives</a>
    <a href="#" onclick="sessionStorage.removeItem('ht_admin');sessionStorage.removeItem('ht_admin_token');window.location.href='/admin/index.html'">Logout</a>
  </div>
</div>
<div class="wrap">
  <div class="hd">
    <h1>📞 All Callback Requests</h1>
    <span id="count">Loading...</span>
  </div>
  <div class="card">
    <div class="search"><input type="text" id="q" placeholder="Search by name, company or mobile..." oninput="filter()"/></div>
    <div id="tbl"><div class="loading">Loading callbacks...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  if(!sessionStorage.getItem('ht_admin_token')){window.location.href='/admin/index.html';}
  let cbs=[],execs=[];

  // Service-role admin API — callback_requests is RLS-protected (PII), so it can't
  // be read with the browser anon key. Auth via the token from admin login.
  async function adminApi(action, payload){
    const token=sessionStorage.getItem('ht_admin_token')||'';
    const r=await fetch('/api/admin?action='+action,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-token':token},
      body:JSON.stringify(payload||{})
    });
    return r.json();
  }

  async function load(){
    const r=await adminApi('callbacks');
    if(!r.ok){
      document.getElementById('tbl').innerHTML='<div class="empty">'+(r.error==='Unauthorized'?'Admin API token missing — log out and log in again.':'Failed to load callbacks.')+'</div>';
      return;
    }
    cbs=r.callbacks||[];
    execs=r.executives||[];
    document.getElementById('count').textContent=cbs.length+' total requests';
    render(cbs);
  }

  function render(data){
    const sc={Pending:'b-orange',Called:'b-blue',Converted:'b-green'};
    document.getElementById('tbl').innerHTML=data.length?`<table>
      <thead><tr><th>Name</th><th>Company</th><th>Mobile</th><th>Preferred Time</th><th>Assigned To</th><th>Status</th><th>Date</th><th>Message</th></tr></thead>
      <tbody>${data.map(c=>`<tr>
        <td><strong>${c.name}</strong></td>
        <td>${c.company}</td>
        <td>📞 <a href="tel:${c.mobile}" style="color:#3b82f6;font-weight:600;">${c.mobile}</a></td>
        <td>${c.preferred_time}</td>
        <td><select onchange="reassign('${c.id}',this.value)">
          <option value="">Unassigned</option>
          ${execs.map(e=>`<option value="${e.id}"${c.assigned_to===e.id?' selected':''}>${e.name}</option>`).join('')}
        </select></td>
        <td><span class="badge ${sc[c.status]||'b-orange'}">${c.status||'Pending'}</span></td>
        <td>${new Date(c.created_at).toLocaleDateString('en-IN')}</td>
        <td style="max-width:180px;color:#64748b;font-size:0.8rem;">${c.message||'—'}</td>
      </tr>`).join('')}</tbody></table>`
    :'<div class="empty">No callback requests yet.</div>';
  }

  function filter(){
    const q=document.getElementById('q').value.toLowerCase();
    render(cbs.filter(c=>(c.name+c.company+c.mobile).toLowerCase().includes(q)));
  }

  async function reassign(id,execId){
    const r=await adminApi('callback-update',{id,patch:{assigned_to:execId||null,assigned_at:new Date().toISOString()}});
    if(!r.ok){toast('Reassign failed.');return;}
    toast('Reassigned!'); load();
  }

  function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000);}

  load();
</script>
</body>
</html>
