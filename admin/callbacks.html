<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Callbacks — HireTrack Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f8fafc; }
.topbar { background:#0f172a; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
.topbar a { color:#fff; font-size:1.2rem; font-weight:800; text-decoration:none; }
.topbar a span { color:#3b82f6; }
.topbar-links { display:flex; gap:1rem; }
.topbar-links a { color:#94a3b8; font-size:0.85rem; text-decoration:none; padding:0.4rem 0.8rem; border-radius:6px; }
.topbar-links a:hover { background:rgba(255,255,255,0.1); color:#fff; }
.topbar-links a.active { color:#fff; background:rgba(59,130,246,0.2); }
.wrap { max-width:1100px; margin:2rem auto; padding:0 1rem; }
.hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
.hd h1 { font-size:1.4rem; font-weight:800; }
.hd span { font-size:0.83rem; color:#64748b; }
.card { background:#fff; border-radius:12px; border:1.5px solid #e2e8f0; overflow:hidden; }
.search-bar { padding:1rem; border-bottom:1px solid #e2e8f0; }
.search-bar input { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:0.55rem 0.9rem; font-size:0.88rem; outline:none; font-family:inherit; }
.search-bar input:focus { border-color:#3b82f6; }
table { width:100%; border-collapse:collapse; }
th { background:#f8fafc; padding:0.75rem 1rem; text-align:left; font-size:0.78rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #e2e8f0; }
td { padding:0.85rem 1rem; font-size:0.85rem; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#f8fafc; }
.badge { font-size:0.72rem; font-weight:700; padding:3px 10px; border-radius:20px; }
.badge-orange { background:#ffedd5; color:#c2410c; }
.badge-blue { background:#dbeafe; color:#1d4ed8; }
.badge-green { background:#dcfce7; color:#15803d; }
select { border:1px solid #e2e8f0; border-radius:6px; padding:4px 8px; font-size:0.78rem; outline:none; font-family:inherit; }
.empty { text-align:center; padding:3rem; color:#94a3b8; }
.loading { text-align:center; padding:3rem; color:#94a3b8; }
.toast { position:fixed; bottom:1.5rem; right:1.5rem; background:#1e293b; color:#fff; padding:0.75rem 1.2rem; border-radius:10px; font-size:0.88rem; font-weight:600; z-index:999; display:none; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/admin/dashboard.html">Hire<span>Track</span></a>
  <div class="topbar-links">
    <a href="/admin/dashboard.html">Overview</a>
    <a href="/admin/callbacks.html" class="active">📞 Callbacks</a>
    <a href="#" onclick="doLogout()">Logout</a>
  </div>
</div>

<div class="wrap">
  <div class="hd">
    <h1>📞 All Callback Requests</h1>
    <span id="cb-count">Loading...</span>
  </div>
  <div class="card">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by name, company or mobile..." oninput="filterTable()" />
    </div>
    <div id="table-wrap"><div class="loading">Loading callbacks...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  if (!sessionStorage.getItem('ht_admin')) { window.location.href = '/admin/index.html'; }

  const URL = 'https://pdjnpqyzayidthpfmvjk.supabase.co';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkam5wcXl6YXlpZHRocGZtdmprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTY4NDgsImV4cCI6MjA5MjU5Mjg0OH0.h0R_BKqPX0GhXS4LBnmkDAVh5ZN91p-qcs2gHrTcSvQ';

  // Direct REST API calls — no Supabase JS library needed
  async function dbGet(table, params='') {
    const r = await fetch(`${URL}/rest/v1/${table}?${params}`, {
      headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' }
    });
    return r.json();
  }

  async function dbPatch(table, filter, data) {
    await fetch(`${URL}/rest/v1/${table}?${filter}`, {
      method: 'PATCH',
      headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(data)
    });
  }

  let allCallbacks = [], allExecs = [];

  async function loadData() {
    try {
      allCallbacks = await dbGet('callback_requests', 'order=created_at.desc');
      // Try to get executives, fall back if column doesn't exist
      try {
        allExecs = await dbGet('executives', 'order=created_at.asc&select=id,name');
      } catch(e) {
        allExecs = [];
      }
      // Handle case where allCallbacks might be an error object
      if (!Array.isArray(allCallbacks)) {
        console.error('Callbacks error:', allCallbacks);
        allCallbacks = [];
      }
      if (!Array.isArray(allExecs)) allExecs = [];
      document.getElementById('cb-count').textContent = `${allCallbacks.length} total requests`;
      renderTable(allCallbacks);
    } catch(e) {
      document.getElementById('table-wrap').innerHTML = `<div class="empty">Error loading data: ${e.message}</div>`;
    }
  }

  function renderTable(callbacks) {
    const statusClass = { Pending:'badge-orange', Called:'badge-blue', Converted:'badge-green' };
    const execMap = Object.fromEntries(allExecs.map(e => [e.id, e.name]));

    document.getElementById('table-wrap').innerHTML = callbacks.length ? `
      <table>
        <thead><tr>
          <th>Name</th><th>Company</th><th>Mobile</th>
          <th>Preferred Time</th><th>Assigned To</th>
          <th>Status</th><th>Date</th><th>Message</th>
        </tr></thead>
        <tbody>${callbacks.map(c => `<tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.company}</td>
          <td>📞 <a href="tel:${c.mobile}" style="color:#3b82f6;font-weight:600;">${c.mobile}</a></td>
          <td>${c.preferred_time}</td>
          <td>
            <select onchange="reassign('${c.id}',this.value)">
              <option value="">Unassigned</option>
              ${allExecs.map(e=>`<option value="${e.id}" ${c.assigned_to===e.id?'selected':''}>${e.name}</option>`).join('')}
            </select>
          </td>
          <td><span class="badge ${statusClass[c.status]||'badge-orange'}">${c.status||'Pending'}</span></td>
          <td>${new Date(c.created_at).toLocaleDateString('en-IN')}</td>
          <td style="max-width:180px;color:#64748b;font-size:0.8rem;">${c.message||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>` : '<div class="empty">No callback requests yet.</div>';
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    renderTable(allCallbacks.filter(c => (c.name+c.company+c.mobile).toLowerCase().includes(q)));
  }

  async function reassign(id, execId) {
    await dbPatch('callback_requests', `id=eq.${id}`, {
      assigned_to: execId || null,
      assigned_at: new Date().toISOString()
    });
    showToast('Reassigned successfully!');
    loadData();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display='block';
    setTimeout(()=>t.style.display='none', 2000);
  }

  function doLogout() { sessionStorage.removeItem('ht_admin'); window.location.href='/admin/index.html'; }

  loadData();
</script>
</body>
</html>

<body>

<div class="topbar">
  <a href="/admin/dashboard.html">Hire<span>Track</span> <span style="font-size:0.75rem;color:#64748b;font-weight:400;">Admin</span></a>
  <div class="topbar-links">
    <a href="/admin/dashboard.html">Overview</a>
    <a href="/admin/callbacks.html" class="active">📞 Callbacks</a>
    <a href="/admin/executives.html">🎯 Executives</a>
    <a href="#" onclick="doLogout()">Logout</a>
  </div>
</div>

<div class="wrap">
  <div class="hd">
    <h1>📞 All Callback Requests</h1>
    <span id="cb-count">Loading...</span>
  </div>
  <div class="card">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by name, company or mobile..." oninput="filterTable()" />
    </div>
    <div id="table-wrap">
      <div class="loading">Loading callbacks from database...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  if (!sessionStorage.getItem('ht_admin')) window.location.href = '/admin/index.html';

  const { createClient } = supabase;
  const sb = createClient(
    'https://pdjnpqyzayidthpfmvjk.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkam5wcXl6YXlpZHRocGZtdmprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTY4NDgsImV4cCI6MjA5MjU5Mjg0OH0.h0R_BKqPX0GhXS4LBnmkDAVh5ZN91p-qcs2gHrTcSvQ'
  );

  let allCallbacks = [];
  let allExecs = [];

  async function loadData() {
    const [{ data: callbacks }, { data: executives }] = await Promise.all([
      sb.from('callback_requests').select('*').order('created_at', { ascending: false }),
      sb.from('executives').select('id,name').eq('is_active', true)
    ]);
    allCallbacks = callbacks || [];
    allExecs = executives || [];
    document.getElementById('cb-count').textContent = `${allCallbacks.length} total requests`;
    renderTable(allCallbacks);
  }

  function renderTable(callbacks) {
    const statusClass = { Pending:'badge-orange', Called:'badge-blue', Converted:'badge-green' };
    const execMap = Object.fromEntries(allExecs.map(e => [e.id, e.name]));
    const execOptions = allExecs.map(e => `<option value="${e.id}">${e.name}</option>`).join('');

    document.getElementById('table-wrap').innerHTML = callbacks.length ? `
      <table>
        <thead><tr><th>Name</th><th>Company</th><th>Mobile</th><th>Preferred Time</th><th>Assigned To</th><th>Status</th><th>Date</th><th>Message</th></tr></thead>
        <tbody>${callbacks.map(c => `<tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.company}</td>
          <td>📞 <a href="tel:${c.mobile}" style="color:#3b82f6;font-weight:600;">${c.mobile}</a></td>
          <td>${c.preferred_time}</td>
          <td>
            <select onchange="reassign('${c.id}',this.value)">
              <option value="">Unassigned</option>
              ${allExecs.map(e=>`<option value="${e.id}" ${c.assigned_to===e.id?'selected':''}>${e.name}</option>`).join('')}
            </select>
          </td>
          <td><span class="badge ${statusClass[c.status]||'badge-gray'}">${c.status}</span></td>
          <td style="white-space:nowrap;">${new Date(c.created_at).toLocaleDateString('en-IN')}</td>
          <td style="max-width:200px;color:#64748b;font-size:0.8rem;">${c.message||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>` : '<div class="empty">No callback requests found.</div>';
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    renderTable(allCallbacks.filter(c =>
      (c.name+c.company+c.mobile).toLowerCase().includes(q)
    ));
  }

  async function reassign(id, execId) {
    await sb.from('callback_requests').update({
      assigned_to: execId || null,
      assigned_at: new Date().toISOString()
    }).eq('id', id);
    showToast('Reassigned!');
    loadData();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function doLogout() { sessionStorage.removeItem('ht_admin'); window.location.href = '/admin/index.html'; }

  loadData();
</script>
