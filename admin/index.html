<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — HireTrack</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:#1e293b; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; border:1px solid rgba(255,255,255,0.08); }
  .logo { font-size:1.5rem; font-weight:800; color:#fff; margin-bottom:0.3rem; }
  .logo span { color:#3b82f6; }
  .sub { color:#64748b; font-size:0.85rem; margin-bottom:2rem; }
  .badge { display:inline-block; background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid rgba(59,130,246,0.3); padding:3px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; margin-bottom:1.5rem; }
  label { display:block; font-size:0.83rem; font-weight:600; color:#94a3b8; margin-bottom:0.4rem; }
  input { width:100%; background:#0f172a; border:1.5px solid rgba(255,255,255,0.1); border-radius:9px; padding:0.75rem 1rem; font-size:0.93rem; color:#fff; outline:none; margin-bottom:1rem; font-family:inherit; transition:border 0.2s; }
  input:focus { border-color:#3b82f6; }
  .btn { width:100%; background:#3b82f6; color:#fff; border:none; padding:0.85rem; font-size:0.95rem; font-weight:700; border-radius:9px; cursor:pointer; font-family:inherit; transition:background 0.2s; margin-top:0.5rem; }
  .btn:hover { background:#2563eb; }
  .err { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:0.75rem 1rem; font-size:0.85rem; margin-bottom:1rem; display:none; }
  .back { text-align:center; margin-top:1.2rem; font-size:0.83rem; color:#64748b; }
  .back a { color:#3b82f6; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Hire<span>Track</span></div>
  <div class="sub">Management Console</div>
  <div class="badge">🔐 Admin Access Only</div>

  <div class="err" id="err"></div>

  <label>Admin Email</label>
  <input type="email" id="email" placeholder="admin@hiretrack.co.in" />

  <label>Password</label>
  <input type="password" id="password" placeholder="Enter admin password" />

  <button class="btn" onclick="doLogin()">Login to Admin Panel</button>
  <div class="back"><a href="/">← Back to HireTrack</a></div>
</div>

<script>
  // Admin credentials — change these to your own
  const ADMIN_EMAIL = import.meta.env.VITE_ADMIN_EMAIL || 'admin@hiretrack.co.in';
  const ADMIN_PASSWORD = import.meta.env.VITE_ADMIN_PASSWORD || 'HireTrack@Admin2025';

  // Redirect if already logged in
  if (sessionStorage.getItem('ht_admin')) window.location.href = '/admin/dashboard.html';

  function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    err.style.display = 'none';

    if (!email || !password) {
      err.textContent = 'Please enter email and password.';
      err.style.display = 'block'; return;
    }
    if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
      sessionStorage.setItem('ht_admin', 'true');
      window.location.href = '/admin/dashboard.html';
    } else {
      err.textContent = 'Invalid email or password.';
      err.style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
