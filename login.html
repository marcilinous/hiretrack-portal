<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://www.hiretrack.co.in/login.html">
<title>Login to HireTrack | India's SME Job Portal</title>
<meta name="description" content="Sign in to your HireTrack account to apply for jobs, track applications and manage your profile.">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="navbar"></div>
<div class="form-wrap" style="max-width:440px;">
  <div class="form-card">
    <h2>Welcome Back</h2>
    <p class="sub">Login to your HireTrack candidate account</p>
    <div class="alert alert-success" id="reset-ok"></div>
    <div class="alert alert-error" id="err-msg"></div>
    <div class="fg-form"><label>Email Address *</label><input type="email" id="email" placeholder="you@example.com" /></div>
    <div class="fg-form"><label>Password *</label><input type="password" id="password" placeholder="Your password" /></div>
    <div style="text-align:right;margin-bottom:0.75rem;">
      <a href="#" onclick="showForgotPassword()" style="font-size:0.8rem;color:#3b82f6;text-decoration:none;font-weight:600;">Forgot password?</a>
    </div>
    <button class="btn-primary" onclick="doLogin()">Login</button>
    <p class="form-switch">Don't have an account? <a href="signup.html">Sign up free</a></p>
    <div class="form-divider"><hr><span>Are you an employer?</span><hr></div>
    <a href="employer-auth.html" style="display:block;text-align:center;background:var(--gray2);color:var(--navy);padding:0.75rem;border-radius:10px;font-weight:600;font-size:0.9rem;">Login as Employer →</a>
  </div>
</div>
<footer><p>© <span id="copy-year">2026</span> <span>HireTrack</span> — Find Jobs Across India. Built with ❤️ in Bengaluru.</p></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/sb-rest-shim.js"></script>
<script src="app.js?v=6"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('');
  if (Session.getCandidate()) window.location.href = 'profile.html';

  // Success banner after a completed password reset (reset-password.html redirects here).
  if (new URLSearchParams(location.search).get('reset') === 'success') {
    const ok = document.getElementById('reset-ok');
    if (ok) { ok.textContent = '✅ Password updated! Please log in with your new password.'; ok.style.display = 'block'; }
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('err-msg');
    errEl.style.display = 'none';
    if (!email || !password) {
      errEl.textContent = 'Please enter email and password.';
      errEl.style.display = 'block';
      return;
    }
    const btn = document.querySelector('.btn-primary');
    btn.textContent = 'Logging in...';
    btn.disabled = true;

    // Safety timeout: if login hangs for >15s, reset the button
    const loginTimeout = setTimeout(() => {
      console.error('Login timeout: CandidateAuth.login() did not resolve within 15s');
      errEl.textContent = 'Login is taking too long. Please check your connection and try again.';
      errEl.style.display = 'block';
      btn.textContent = 'Login';
      btn.disabled = false;
    }, 15000);

    try {
      const result = await CandidateAuth.login(email, password);
      clearTimeout(loginTimeout);
      if (!result.ok) {
        errEl.textContent = result.msg;
        errEl.style.display = 'block';
        btn.textContent = 'Login';
        btn.disabled = false;
        return;
      }
      // Success — redirect
      const redirect = sessionStorage.getItem('redirect_after_login') || 'profile.html';
      sessionStorage.removeItem('redirect_after_login');
      window.location.href = redirect;
    } catch (e) {
      clearTimeout(loginTimeout);
      console.error('Candidate login exception:', e);
      errEl.textContent = e.message || 'An unexpected error occurred. Please try again.';
      errEl.style.display = 'block';
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function showForgotPassword() {
    const existing = document.getElementById('forgot-modal');
    if (existing) existing.remove();
    document.body.insertAdjacentHTML('beforeend', `
      <div id="forgot-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;" onclick="if(event.target===this)this.remove()">
        <div style="background:#fff;border-radius:16px;padding:2rem;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
          <h3 style="font-size:1.05rem;font-weight:800;color:#0f172a;margin:0 0 0.4rem;">Reset Password</h3>
          <p style="font-size:0.82rem;color:#64748b;margin:0 0 1.2rem;">Enter your registered email. We'll send you a password reset link.</p>
          <input type="email" id="forgot-email" placeholder="your@email.com"
             style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:0.65rem 0.85rem;font-size:0.88rem;font-family:inherit;outline:none;margin-bottom:0.75rem;box-sizing:border-box;"/>
          <div id="forgot-msg" style="font-size:0.8rem;margin-bottom:0.75rem;min-height:18px;"></div>
          <button onclick="sendResetEmail()" style="width:100%;background:#3b82f6;color:#fff;border:none;padding:0.8rem;border-radius:8px;font-size:0.92rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:0.5rem;">Send Reset Link</button>
          <button onclick="document.getElementById('forgot-modal').remove()" style="width:100%;background:#f1f5f9;color:#374151;border:none;padding:0.75rem;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
      </div>`);
  }

  async function sendResetEmail() {
    const email = document.getElementById('forgot-email').value.trim();
    const msg = document.getElementById('forgot-msg');
    if (!email) { msg.style.color='#dc2626'; msg.textContent='Please enter your email.'; return; }
    msg.style.color='#64748b'; msg.textContent='Sending...';
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });
      if (error) {
        msg.style.color='#dc2626'; msg.textContent=error.message || 'Email not found. Please check and try again.';
      } else {
        msg.style.color='#22c55e'; msg.textContent='✅ Reset link sent! Check your email inbox.';
        setTimeout(() => document.getElementById('forgot-modal')?.remove(), 3000);
      }
    } catch (e) {
      console.error('Reset password exception:', e);
      msg.style.color='#dc2626'; msg.textContent=e.message || 'Error occurred. Please check your connection.';
    }
  }

</script>
<script>(function(){var _cy=document.getElementById("copy-year");if(_cy)_cy.textContent=new Date().getFullYear();})();</script>
</body>
</html>
