<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — HireTrack</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="navbar"></div>

<div class="form-wrap" style="max-width:440px;">
  <div class="form-card">
    <h2>Welcome Back</h2>
    <p class="sub">Login to your HireTrack candidate account</p>

    <div class="alert alert-error" id="err-msg"></div>

    <div class="fg-form">
      <label>Email Address *</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="fg-form">
      <label>Password *</label>
      <input type="password" id="password" placeholder="Your password" />
    </div>

    <button class="btn-primary" id="login-btn" onclick="doLogin()">Login</button>
    <p class="form-switch">Don't have an account? <a href="signup.html">Sign up free</a></p>
    <div class="form-divider"><hr><span>Are you an employer?</span><hr></div>
    <a href="employer-auth.html" style="display:block;text-align:center;background:var(--gray2);color:var(--navy);padding:0.75rem;border-radius:10px;font-weight:600;font-size:0.9rem;">Login as Employer →</a>
  </div>
</div>

<footer><p>© 2026 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>

<script src="app.js"></script>
<script>
  // STEP 2: Initialize Supabase (Use same keys as signup.html)
  const SB_URL = 'YOUR_SUPABASE_URL';
  const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

  document.getElementById('navbar').innerHTML = renderNavbar('');

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('err-msg');
    const btn = document.getElementById('login-btn');

    errEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = 'Please enter email and password.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = "Authenticating...";

    try {
      // STEP 3: Query Supabase for the user
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('email', email)
        .eq('password', password) // Matching plain text for now
        .single();

      if (error || !data) {
        throw new Error("Invalid email or password.");
      }

      // STEP 4: Store session locally so profile.html knows who is logged in
      // We still use localStorage here just to keep the "Session" alive
      localStorage.setItem('currentUser', JSON.stringify(data));

      window.location.href = 'profile.html';

    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = "Login";
    }
  }

  // Allow "Enter" key to submit
  document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
