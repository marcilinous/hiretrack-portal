<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://www.hiretrack.co.in/employer.html">
<title>Employer Profile — HireTrack</title>
<meta name="description" content="View jobs posted by this employer on HireTrack.">
<meta name="robots" content="index, follow">

<meta property="og:type"        content="website">
<meta property="og:site_name"   content="HireTrack">
<meta property="og:title"       content="Employer Profile — HireTrack">
<meta property="og:description" content="View jobs posted by this employer on HireTrack.">
<meta property="og:url"         content="">
<meta property="og:image"       content="https://www.hiretrack.co.in/og-image.png">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<style>
body { padding-top: 64px; background: #f8fafc; }

.ep-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.ep-breadcrumb {
  font-size: 0.8rem;
  color: #94a3b8;
  margin-bottom: 1.5rem;
  display: flex;
  gap: 0.4rem;
  align-items: center;
  flex-wrap: wrap;
}
.ep-breadcrumb a { color: #3b82f6; text-decoration: none; }
.ep-breadcrumb a:hover { text-decoration: underline; }

/* ── Company header card ── */
.ep-header-card {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  padding: 2rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: flex-start;
  gap: 1.5rem;
}

.ep-logo {
  width: 80px;
  height: 80px;
  border-radius: 18px;
  object-fit: contain;
  border: 1.5px solid #e2e8f0;
  flex-shrink: 0;
  background: #f8fafc;
}

.ep-initials {
  width: 80px;
  height: 80px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: -1px;
}

.ep-header-info { flex: 1; min-width: 0; }

.ep-company-name {
  font-size: 1.6rem;
  font-weight: 900;
  color: #0f172a;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}

.ep-meta-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
  color: #64748b;
}

.ep-badge-verified {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #dcfce7;
  color: #15803d;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}

.ep-badge-location {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.78rem;
  color: #64748b;
}

.ep-since {
  font-size: 0.75rem;
  color: #94a3b8;
}

.ep-stats-row {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

.ep-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ep-stat-num {
  font-size: 1.3rem;
  font-weight: 900;
  color: #0f172a;
  line-height: 1;
}

.ep-stat-label {
  font-size: 0.7rem;
  color: #94a3b8;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* ── Jobs section ── */
.ep-section-heading {
  font-size: 0.72rem;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 1rem;
}

.ep-jobs-list { display: flex; flex-direction: column; gap: 0.75rem; }

.ep-job-card {
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 14px;
  padding: 1.1rem 1.25rem;
  text-decoration: none;
  display: block;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.ep-job-card:hover {
  border-color: #93c5fd;
  box-shadow: 0 4px 18px rgba(59,130,246,0.1);
}

.ep-job-title {
  font-size: 0.97rem;
  font-weight: 800;
  color: #0f172a;
  margin-bottom: 0.3rem;
  line-height: 1.3;
}

.ep-job-meta {
  font-size: 0.78rem;
  color: #64748b;
  display: flex;
  flex-wrap: wrap;
  gap: 0 0.4rem;
  align-items: center;
  margin-bottom: 0.55rem;
}

.ep-job-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.55rem;
}

.ep-job-chip {
  font-size: 0.72rem;
  color: #374151;
  background: #f1f5f9;
  padding: 3px 9px;
  border-radius: 6px;
  font-weight: 500;
}

.ep-skill-chip {
  font-size: 0.67rem;
  background: #eff6ff;
  color: #1d4ed8;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
}

.ep-job-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.ep-job-time {
  font-size: 0.72rem;
  color: #94a3b8;
}

.ep-apply-hint {
  font-size: 0.72rem;
  color: #3b82f6;
  font-weight: 600;
}

.ep-empty {
  text-align: center;
  padding: 3rem 1rem;
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid #e2e8f0;
  color: #64748b;
  font-size: 0.9rem;
}
.ep-empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

.ep-loading {
  text-align: center;
  padding: 3rem 1rem;
  color: #94a3b8;
  font-size: 0.9rem;
}

.ep-error {
  text-align: center;
  padding: 3rem 1rem;
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid #e2e8f0;
  color: #ef4444;
  font-size: 0.9rem;
}

/* ── Interview Reviews ── */
.ir-summary-card {
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid #e2e8f0;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 2rem;
  flex-wrap: wrap;
}
.ir-avg-num { font-size: 2.5rem; font-weight: 900; color: #0f172a; line-height: 1; }
.ir-avg-stars { color: #f59e0b; font-size: 1.1rem; letter-spacing: 2px; }
.ir-avg-count { font-size: 0.78rem; color: #94a3b8; margin-top: 3px; }
.ir-breakdown { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 160px; }
.ir-bar-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; }
.ir-bar-label { color: #64748b; font-weight: 600; width: 50px; flex-shrink: 0; }
.ir-bar-track { flex: 1; background: #f1f5f9; border-radius: 4px; height: 6px; overflow: hidden; }
.ir-bar-fill { height: 100%; border-radius: 4px; background: #2563eb; }
.ir-bar-pct { color: #94a3b8; width: 28px; text-align: right; flex-shrink: 0; }
.ir-review-card {
  background: #fff;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  padding: 1rem 1.25rem;
  margin-bottom: 0.65rem;
}
.ir-review-header { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
.ir-stars { color: #f59e0b; font-size: 0.92rem; letter-spacing: 1px; }
.ir-chip { font-size: 0.7rem; font-weight: 600; padding: 2px 9px; border-radius: 6px; }
.ir-chip-Easy { background: #dcfce7; color: #15803d; }
.ir-chip-Medium { background: #fef3c7; color: #b45309; }
.ir-chip-Hard { background: #fee2e2; color: #dc2626; }
.ir-chip-Yes { background: #dcfce7; color: #15803d; }
.ir-chip-No { background: #fee2e2; color: #dc2626; }
.ir-chip-Pending { background: #fef3c7; color: #b45309; }
.ir-review-exp { font-size: 0.85rem; color: #334155; line-height: 1.6; margin-bottom: 0.4rem; }
.ir-review-meta { font-size: 0.72rem; color: #94a3b8; }

@media (max-width: 600px) {
  .ep-header-card { flex-direction: column; gap: 1rem; }
  .ep-logo, .ep-initials { width: 60px; height: 60px; font-size: 1.5rem; }
  .ep-company-name { font-size: 1.3rem; }
}
</style>
</head>

<script>
document.getElementById('navbar').innerHTML = renderNavbar('jobs');

(async function () {
  const params     = new URLSearchParams(window.location.search);
  const employerId = params.get('id');
  const content    = document.getElementById('ep-content');

  if (!employerId) {
    content.innerHTML = '<div class="ep-error">No employer ID specified. <a href="/jobs.html">Browse all jobs →</a></div>';
    return;
  }

  // Fetch employer (public-safe fields only — no email/password/mobile)
  const [{ data: employer, error: empErr }, { data: jobs }, { data: reviews }] = await Promise.all([
    sb.from('employers_public').select('id,company,contact_name,city,company_logo,plan,plan_expires_at,created_at').eq('id', employerId).single(),
    sb.from('jobs').select('id,title,location,salary,experience,job_type,skills,posted_at,expires_at,views').eq('employer_id', employerId).eq('delisted', false).order('posted_at', { ascending: false }),
    sb.from('interview_reviews').select('rating,difficulty,got_offer,experience,job_title,created_at').eq('employer_id', employerId).order('created_at', { ascending: false }).limit(50),
  ]);

  if (empErr || !employer) {
    content.innerHTML = '<div class="ep-error">Employer not found. <a href="/jobs.html">Browse all jobs →</a></div>';
    return;
  }

  const now       = new Date();
  const activeJobs = (jobs || []).filter(j => !j.expires_at || new Date(j.expires_at) > now);

  // Update breadcrumb + page title
  const companyName = employer.company || employer.contact_name || 'Employer';
  document.getElementById('bc-company').textContent = companyName;
  document.title = `${companyName} — HireTrack`;
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${companyName} — Jobs on HireTrack`);
  document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);

  // Plan badge
  const isPremium = employer.plan && employer.plan !== 'free' &&
    (!employer.plan_expires_at || new Date(employer.plan_expires_at) > now);
  const verifiedBadge = isPremium
    ? `<span class="ep-badge-verified">✓ Verified Employer</span>`
    : '';

  // Logo or initials
  const initials  = companyName.trim().charAt(0).toUpperCase();
  const bgColors  = ['#2563eb','#7c3aed','#db2777','#059669','#d97706','#dc2626'];
  const colorIdx  = companyName.charCodeAt(0) % bgColors.length;
  const bgColor   = bgColors[colorIdx];
  const logoHtml  = employer.company_logo
    ? `<img class="ep-logo" src="${esc(employer.company_logo)}" alt="${esc(companyName)} logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="ep-initials" style="background:${bgColor};display:none;">${initials}</div>`
    : `<div class="ep-initials" style="background:${bgColor};">${initials}</div>`;

  // Member since
  const since = employer.created_at
    ? new Date(employer.created_at).getFullYear()
    : null;
  const sinceHtml = since ? `<span class="ep-since">Member since ${since}</span>` : '';

  // City
  const cityHtml = employer.city
    ? `<span class="ep-badge-location">📍 ${esc(employer.city)}</span>`
    : '';

  // Stats
  const statsHtml = `
    <div class="ep-stats-row">
      <div class="ep-stat">
        <div class="ep-stat-num">${activeJobs.length}</div>
        <div class="ep-stat-label">Active Jobs</div>
      </div>
      ${employer.city ? `<div class="ep-stat"><div class="ep-stat-num" style="font-size:1rem;">${esc(employer.city)}</div><div class="ep-stat-label">Location</div></div>` : ''}
    </div>`;

  // Job cards
  const jobsHtml = activeJobs.length
    ? `<div class="ep-jobs-list">${activeJobs.map(j => renderJobCard(j)).join('')}</div>`
    : `<div class="ep-empty">
        <div class="ep-empty-icon">🗂</div>
        <div>No active job openings right now.</div>
        <div style="margin-top:0.5rem;font-size:0.8rem;"><a href="/jobs.html" style="color:#3b82f6;">Browse all jobs →</a></div>
       </div>`;

  content.innerHTML = `
    <div class="ep-header-card">
      ${logoHtml}
      <div class="ep-header-info">
        <div class="ep-company-name">${esc(companyName)}</div>
        <div class="ep-meta-row">
          ${cityHtml}
          ${verifiedBadge}
          ${sinceHtml}
        </div>
        ${statsHtml}
      </div>
    </div>

    <div class="ep-section-heading">Current Openings (${activeJobs.length})</div>
    ${jobsHtml}
    ${renderReviews(reviews || [])}
  `;
})();

function renderJobCard(job) {
  const skills = Array.isArray(job.skills)
    ? job.skills
    : (job.skills || '').split(',').map(s => s.trim()).filter(Boolean);

  const chipsHtml = [
    job.location   ? `<span class="ep-job-chip">📍 ${esc(job.location)}</span>`   : '',
    job.salary     ? `<span class="ep-job-chip">💰 ${esc(job.salary)}</span>`     : '',
    job.experience ? `<span class="ep-job-chip">🎯 ${esc(job.experience)}</span>` : '',
    job.job_type   ? `<span class="ep-job-chip">${esc(job.job_type)}</span>`       : '',
  ].filter(Boolean).join('');

  const skillsHtml = skills.slice(0, 4).map(s => `<span class="ep-skill-chip">${esc(s)}</span>`).join('');
  const moreSkills = skills.length > 4 ? `<span style="font-size:0.67rem;color:#94a3b8;padding:2px 4px;">+${skills.length - 4} more</span>` : '';

  return `
    <a href="/job.html?id=${job.id}" class="ep-job-card">
      <div class="ep-job-title">${esc(job.title)}</div>
      <div class="ep-job-chips">${chipsHtml}</div>
      ${skillsHtml || moreSkills ? `<div class="ep-job-chips">${skillsHtml}${moreSkills}</div>` : ''}
      <div class="ep-job-footer">
        <span class="ep-job-time">🕒 ${timeAgoLocal(job.posted_at)}</span>
        <span class="ep-apply-hint">Apply →</span>
      </div>
    </a>`;
}

function renderReviews(reviews) {
  if (!reviews.length) return '';
  const avg = reviews.reduce((s, r) => s + r.rating, 0) / reviews.length;
  const avgRounded = Math.round(avg * 10) / 10;
  const diffCounts = { Easy: 0, Medium: 0, Hard: 0 };
  reviews.forEach(r => { if (r.difficulty in diffCounts) diffCounts[r.difficulty]++; });
  const total = reviews.length;
  const diffBar = (label, count) => {
    const pct = total ? Math.round(count / total * 100) : 0;
    return `<div class="ir-bar-row"><span class="ir-bar-label">${label}</span><div class="ir-bar-track"><div class="ir-bar-fill" style="width:${pct}%;"></div></div><span class="ir-bar-pct">${pct}%</span></div>`;
  };
  const cards = reviews.map(r => {
    const filled = Math.round(r.rating);
    const starsHtml = '★'.repeat(filled) + '☆'.repeat(5 - filled);
    const date = new Date(r.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    return `<div class="ir-review-card">
      <div class="ir-review-header">
        <span class="ir-stars">${starsHtml}</span>
        <span class="ir-chip ir-chip-${esc(r.difficulty)}">${esc(r.difficulty)}</span>
        <span class="ir-chip ir-chip-${esc(r.got_offer)}">Offer: ${esc(r.got_offer)}</span>
        ${r.job_title ? `<span style="font-size:0.7rem;color:#94a3b8;">· ${esc(r.job_title)}</span>` : ''}
      </div>
      <div class="ir-review-exp">${esc(r.experience)}</div>
      <div class="ir-review-meta">Verified Candidate · ${date}</div>
    </div>`;
  }).join('');
  const avgFilled = Math.round(avg);
  return `
    <div style="margin-top:2rem;">
      <div class="ep-section-heading">Interview Reviews (${total})</div>
      <div class="ir-summary-card">
        <div style="text-align:center;">
          <div class="ir-avg-num">${avgRounded}</div>
          <div class="ir-avg-stars">${'★'.repeat(avgFilled)}${'☆'.repeat(5 - avgFilled)}</div>
          <div class="ir-avg-count">${total} review${total !== 1 ? 's' : ''}</div>
        </div>
        <div class="ir-breakdown">
          ${diffBar('Easy', diffCounts.Easy)}
          ${diffBar('Medium', diffCounts.Medium)}
          ${diffBar('Hard', diffCounts.Hard)}
        </div>
      </div>
      ${cards}
    </div>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgoLocal(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return '1 day ago';
  if (days < 30)  return `${days} days ago`;
  return new Date(isoStr).toLocaleDateString('en-IN');
}
