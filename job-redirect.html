<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… | HireTrack</title>
<meta name="robots" content="noindex,follow">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #0f172a; }
  .wrap { max-width: 480px; margin: 25vh auto; text-align: center; padding: 1rem; }
  .wrap a { color: #2563eb; }
  .spinner { width: 28px; height: 28px; margin: 0 auto 1rem; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner" aria-hidden="true"></div>
  <p>Loading job…</p>
  <p><a id="fallback" href="/jobs.html">Browse all jobs →</a></p>
</div>
<script>
(async function () {
  const params = new URLSearchParams(window.location.search);
  const jobId = params.get('id');
  if (!jobId) { window.location.replace('/jobs.html'); return; }

  // 1) Try the static redirect map first — no DB round trip in the happy path.
  try {
    const r = await fetch('/jobs-redirect-map.json', { cache: 'force-cache' });
    if (r.ok) {
      const map = await r.json();
      const target = map[jobId];
      if (target) { window.location.replace(target); return; }
    }
  } catch (_) {}

  // 2) Fall back to the dynamic /job.html?id=… view. The job's canonical
  //    points to the SSG URL, so the static page wins once it exists.
  window.location.replace('/job.html?id=' + encodeURIComponent(jobId));
})();
</script>
</body>
</html>
