<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post a Job — HireTrack</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="navbar"></div>

<div class="page-hd">
  <h1>Post a Job on HireTrack</h1>
  <p>Reach thousands of qualified MIS & Data professionals across Karnataka</p>
</div>

<div class="form-wrap">
  <div class="form-card">

    <div class="ai-card" style="margin-bottom:1.5rem;">
      <div class="ai-card-header">
        <div class="ai-pulse"></div>
        <h3>AI Job Description Writer</h3>
        <span class="ai-badge">Powered by Gemini</span>
      </div>
      <p style="font-size:0.83rem;color:var(--gray5);margin-bottom:0.8rem;">Describe the role briefly and AI will write the job description for you!</p>
      <div class="ai-row">
        <input type="text" id="ai-jd-input" placeholder="e.g. MIS Executive with Excel and SQL, 2–4 years exp" />
        <button onclick="generateJD()">Generate</button>
      </div>
      <div class="ai-response" id="ai-jd-response"></div>
    </div>

    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div class="form-row">
      <div class="fg-form">
        <label>Job Title *</label>
        <input type="text" id="job-title" placeholder="e.g. MIS Executive" />
      </div>
      <div class="fg-form">
        <label>Company Name *</label>
        <input type="text" id="company" placeholder="Your company name" />
      </div>
    </div>
    <div class="form-row">
      <div class="fg-form">
        <label>Location *</label>
        <select id="location">
          <option value="">Select city</option>
          <option>Bengaluru</option>
          <option>Mysuru</option>
          <option>Mangaluru</option>
          <option>Hubballi</option>
          <option>Remote</option>
          <option>Other Karnataka</option>
        </select>
      </div>
      <div class="fg-form">
        <label>Job Type *</label>
        <select id="job-type">
          <option>Full Time</option>
          <option>Contract</option>
          <option>Remote</option>
          <option>Part Time</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="fg-form">
        <label>Salary Range</label>
        <input type="text" id="salary" placeholder="e.g. ₹4–6 LPA" />
      </div>
      <div class="fg-form">
        <label>Experience Required</label>
        <select id="experience">
          <option>0–1 years (Fresher)</option>
          <option>1–3 years</option>
          <option>3–5 years</option>
          <option>5+ years</option>
        </select>
      </div>
    </div>
    <div class="fg-form">
      <label>Required Skills (comma separated)</label>
      <input type="text" id="skills" placeholder="e.g. Excel, SQL, Power BI, MIS Reporting" />
    </div>
    <div class="fg-form">
      <label>WhatsApp Contact Number *</label>
      <input type="tel" id="phone" placeholder="10-digit mobile for WhatsApp applications" maxlength="10" />
    </div>
    <div class="fg-form">
      <label>Job Description *</label>
      <textarea id="description" rows="6" placeholder="Describe the role, responsibilities and requirements..."></textarea>
    </div>
    <div class="fg-form">
      <label>Contact Email *</label>
      <input type="email" id="email" placeholder="hr@yourcompany.com" />
    </div>

    <button class="btn-primary" id="btn-submit" onclick="submitJob()">Post Job for Free</button>
  </div>
</div>

<footer><p>© 2026 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>

<script src="app.js"></script>

<script>
  // STEP 2: Initialize Supabase (Replace with your actual keys)
  const SUPABASE_URL = 'https://jljnhklhglskkqjlqeke.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impsam5oa2xoZ2xza2txamxxZWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTUwMzMsImV4cCI6MjA5MjUzMTAzM30.hcEj9xsprY4fDImtN--0cKxgQ0NFxU7ErUa_1Wj5ZNQ';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById('navbar').innerHTML = renderNavbar('');

  // Check if employer is logged in using your existing app.js Auth logic
  const employer = Auth.getCurrentEmployer();
  if (!employer) {
    sessionStorage.setItem('redirect_after_employer_login', 'post-job.html');
    window.location.href = 'employer-auth.html';
  } else {
    document.getElementById('company').value = employer.company;
    document.getElementById('email').value = employer.email;
    document.getElementById('phone').value = employer.mobile || '';
  }

  // AI JD Generation Logic
  async function generateJD() {
    const input = document.getElementById('ai-jd-input').value.trim();
    if (!input) return;
    const box = document.getElementById('ai-jd-response');
    box.style.display = 'block';
    box.innerHTML = '<span class="ai-loading">Writing job description...</span>';
    
    const prompt = `Write a professional job description for: "${input}". Format: Role Summary (2 lines), Key Responsibilities (4 bullet points), Required Skills (4 items), Nice to have (2 items). Keep it professional and suitable for a Karnataka-based company. Plain text only, no markdown.`;
    
    try {
      // Assuming callGroq or similar is defined in your app.js
      const answer = await callGroq(prompt); 
      box.textContent = answer;
      document.getElementById('description').value = answer;
    } catch (err) {
      box.textContent = "Error generating description. Please try again.";
    }
  }

  // STEP 3: Updated Submit Job to save to Supabase
  async function submitJob() {
    const title = document.getElementById('job-title').value.trim();
    const company = document.getElementById('company').value.trim();
    const location = document.getElementById('location').value;
    const jobType = document.getElementById('job-type').value;
    const salary = document.getElementById('salary').value.trim();
    const experience = document.getElementById('experience').value;
    const skills = document.getElementById('skills').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const description = document.getElementById('description').value.trim();
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('err-msg');
    const successEl = document.getElementById('success-msg');
    const submitBtn = document.getElementById('btn-submit');

    errEl.style.display = 'none'; 
    successEl.style.display = 'none';

    // Validation
    if (!title || !company || !location || !description || !email || !phone) {
      errEl.textContent = 'Please fill in all required fields.'; 
      errEl.style.display='block'; 
      return;
    }
    if (phone.length !== 10 || !/^\d+$/.test(phone)) {
      errEl.textContent = 'Please enter a valid 10-digit WhatsApp number.'; 
      errEl.style.display='block'; 
      return;
    }

    submitBtn.textContent = 'Posting...';
    submitBtn.disabled = true;

    // Prepare Data Object for Cloud Storage
    const jobPost = {
      title,
      company,
      location,
      job_type: jobType,
      salary,
      experience,
      skills,
      whatsapp_phone: phone,
      description,
      contact_email: email,
      employer_id: employer.id,
      posted_at: new Date().toISOString()
    };

    // Save to Supabase Table 'jobs'
    const { data, error } = await _supabase
      .from('jobs')
      .insert([jobPost]);

    if (error) {
      errEl.textContent = 'Database Error: ' + error.message;
      errEl.style.display = 'block';
      submitBtn.textContent = 'Post Job for Free';
      submitBtn.disabled = false;
    } else {
      // Logic for backward compatibility with your app.js local storage if needed
      if(typeof Auth.saveEmployerJob === 'function'){
        Auth.saveEmployerJob(jobPost); 
      }

      successEl.textContent = '✅ Job posted successfully! It is now live on HireTrack.';
      successEl.style.display = 'block';
      submitBtn.textContent = 'Posted ✓';
      
      setTimeout(() => {
        window.location.href = 'employer-dashboard.html';
      }, 1500);
    }
  }
</script>
</body>
</html>
