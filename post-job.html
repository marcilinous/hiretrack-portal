<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://www.hiretrack.co.in/post-job.html">
<style>body{padding-top:64px;}</style>
<title>Post a Job — HireTrack</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="navbar"></div>
<div class="page-hd"><h1>Post a Job on HireTrack</h1><p>Reach thousands of MIS & Data professionals across India</p></div>
<div class="form-wrap">
  <div class="form-card">
    <div class="ai-card" style="margin-bottom:1.5rem;">
      <div class="ai-card-header"><div class="ai-pulse"></div><h3>AI Job Description Writer</h3><span class="ai-badge">Powered by Groq</span></div>
      <p style="font-size:0.83rem;color:var(--gray5);margin-bottom:0.8rem;">Describe the role and AI will write the description!</p>
      <div class="ai-row"><input type="text" id="ai-jd-input" placeholder="e.g. MIS Executive with Excel and SQL, 2–4 years exp" /><button onclick="generateJD()">Generate</button></div>
      <div class="ai-response" id="ai-jd-response"></div>
    </div>
    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>
    <div class="fg-form"><label>Company Name *</label><input type="text" id="company" placeholder="Your company name" /></div>
    <!-- Shared job fields (JobForm — identical to the executive dashboard) -->
    <div id="jf-container"></div>
    <div class="fg-form"><label>Contact Email *</label><input type="email" id="email" placeholder="hr@yourcompany.com" /></div>
    <button class="btn-primary" onclick="submitJob()">Post Job for Free</button>
  </div>
</div>
<footer><p>© <span id="copy-year">2026</span> <span>HireTrack</span> — Find Jobs Across India. Built with ❤️ in Bengaluru.</p></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/pincode.js"></script>
<script src="/js/sb-rest-shim.js"></script>
<script src="app.js?v=6"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('postjob');
  let employer = Session.getEmployer();

  // Render the shared job fields immediately; confirm auth + prefill below.
  JobForm.renderInto('jf-container');

  // Wait for the Supabase session restore before redirecting (a fresh tab has an
  // empty sessionStorage but may still hold a valid session in localStorage).
  (async () => {
    if (!employer && window.htSessionReady) { try { await window.htSessionReady; } catch (e) {} employer = Session.getEmployer(); }
    if (!employer) { sessionStorage.setItem('redirect_after_employer_login','post-job.html'); window.location.href='employer-auth.html'; return; }
    document.getElementById('company').value = employer.company || '';
    document.getElementById('email').value = employer.email || '';
    const phoneEl = document.getElementById('jf-phone'); if (phoneEl) phoneEl.value = employer.mobile || '';
  })();

  async function generateJD() {
    const input=document.getElementById('ai-jd-input').value.trim(); if(!input) return;
    const box=document.getElementById('ai-jd-response'); box.style.display='block';
    box.innerHTML='<span class="ai-loading">Writing job description...</span>';
    const answer=await callGroq(`Write a professional job description for: "${input}". Format: Role Summary (2 lines), Key Responsibilities (4 bullet points), Required Skills (4 items). Plain text only, no markdown.`);
    box.textContent=answer; document.getElementById('jf-description').value=answer;
  }

  async function submitJob() {
    const company=document.getElementById('company').value.trim();
    const email=document.getElementById('email').value.trim();
    const d=JobForm.collect();
    const errEl=document.getElementById('err-msg'); const successEl=document.getElementById('success-msg');
    errEl.style.display='none'; successEl.style.display='none';

    const fieldErr = JobForm.validate(d);
    if (fieldErr) { errEl.textContent=fieldErr; errEl.style.display='block'; return; }
    if (!company || !email) { errEl.textContent='Please enter your company name and contact email.'; errEl.style.display='block'; return; }

    // ── Bug 1: free-trial employers are limited to job_limit TOTAL jobs (any
    // status). Counting all jobs (not just active) stops the delist-and-repost
    // loophole. Non-trial plans keep the active-count behaviour. ──
    const jobLimit = employer.job_limit || 1;
    if (employer.is_free_trial) {
      const q = window.sbQuery || sb;
      const { data: allJobs } = await q.from('jobs').select('id').eq('employer_id', employer.id);
      if ((allJobs || []).length >= jobLimit) {
        errEl.innerHTML=`⚠️ Free trial allows only <strong>${jobLimit} active job post${jobLimit>1?'s':''}</strong>. <a href="pricing.html" style="color:#3b82f6;font-weight:700;">Upgrade to post more →</a>`;
        errEl.style.display='block'; return;
      }
    } else {
      const myJobs = await JobsDB.getEmployerJobs(employer.id);
      const activeJobs = myJobs.filter(j => !j.delisted && (!j.expires_at || new Date() < new Date(j.expires_at)));
      if (activeJobs.length >= jobLimit) {
        errEl.innerHTML=`⚠️ Your <strong>${employer.plan||'free'}</strong> plan allows only <strong>${jobLimit} active job${jobLimit>1?'s':''}</strong>. <a href="pricing.html" style="color:#3b82f6;font-weight:700;">Upgrade →</a>`;
        errEl.style.display='block'; return;
      }
    }

    const btn=document.querySelector('.btn-primary'); btn.textContent='Posting...'; btn.disabled=true;
    const result=await JobsDB.postJob({
      title:d.title, company, location:d.location, pincode:d.pincode, city:d.city, subcity:d.subcity,
      jobType:d.jobType, salary:d.salary, experience:d.experience, skills:d.skills,
      application_deadline:d.application_deadline, openings:d.openings,
      phone:d.phone, description:d.description, email,
      employerId:employer.id, dayLimit:employer.day_limit||15
    });
    if(!result.ok){errEl.textContent=result.msg;errEl.style.display='block';btn.textContent='Post Job for Free';btn.disabled=false;return;}
    successEl.textContent='✅ Job posted successfully! It is now live on HireTrack.'; successEl.style.display='block';
    btn.textContent='Posted ✓';
    // Fire-and-forget: job posted confirmation to employer + candidate alerts
    fetch('/api/email?action=job-posted', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: employer.email,
        contactName: employer.contact_name || employer.company,
        jobTitle: d.title,
        company,
        location: d.location,
        jobType: d.jobType,
        salary: d.salary,
        dayLimit: employer.day_limit || 15
      })
    }).catch(() => {});
    fetch('/api/email?action=trigger-alerts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: d.title, company, location: d.location, salary: d.salary, jobType: d.jobType, skills: d.skills, jobId: result.job?.id })
    }).catch(() => {});
    setTimeout(()=>window.location.href='employer-dashboard.html',1500);
  }

</script>
<script>(function(){var _cy=document.getElementById("copy-year");if(_cy)_cy.textContent=new Date().getFullYear();})();</script>
</body>
</html>
