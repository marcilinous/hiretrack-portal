<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://www.hiretrack.co.in/post-job.html">
<style>body{padding-top:64px;}</style>
<title>Post a Job — HireTrack</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="navbar"></div>
<div class="page-hd"><h1>Post a Job on HireTrack</h1><p>Reach thousands of MIS & Data professionals across India</p></div>
<div class="form-wrap">
  <div class="form-card">
    <div class="ai-card" style="margin-bottom:1.5rem;">
      <div class="ai-card-header"><div class="ai-pulse"></div><h3>AI Job Description Writer</h3><span class="ai-badge">Powered by Groq</span></div>
      <p style="font-size:0.83rem;color:var(--gray5);margin-bottom:0.8rem;">Describe the role and AI will write the description!</p>
      <div class="ai-row"><input type="text" id="ai-jd-input" placeholder="e.g. MIS Executive with Excel and SQL, 2–4 years exp" /><button onclick="generateJD()">Generate</button></div>
      <div class="ai-response" id="ai-jd-response"></div>
    </div>
    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>
    <div class="fg-form"><label>Company Name *</label><input type="text" id="company" placeholder="Your company name" /></div>
    <!-- Shared job fields (JobForm — identical to the executive dashboard) -->
    <div id="jf-container"></div>
    <div class="fg-form"><label>Contact Email *</label><input type="email" id="email" placeholder="hr@yourcompany.com" /></div>
    <button class="btn-primary" onclick="submitJob()">Post Job for Free</button>
  </div>
</div>
<footer><p>© <span id="copy-year">2026</span> <span>HireTrack</span> — Find Jobs Across India. Built with ❤️ in Bengaluru.</p></footer>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/pincode.js"></script>
<script src="/js/sb-rest-shim.js"></script>
<script src="app.js?v=6"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('postjob');
  let employer = Session.getEmployer();

  // Render the shared job fields immediately; confirm auth + prefill below.
  JobForm.renderInto('jf-container');

  // Wait for the Supabase session restore before redirecting (a fresh tab has an
  // empty sessionStorage but may still hold a valid session in localStorage).
  (async () => {
    if (!employer && window.htSessionReady) { try { await window.htSessionReady; } catch (e) {} employer = Session.getEmployer(); }
    if (!employer) { sessionStorage.setItem('redirect_after_employer_login','post-job.html'); window.location.href='employer-auth.html'; return; }
    document.getElementById('company').value = employer.company || '';
    document.getElementById('email').value = employer.email || '';
    const phoneEl = document.getElementById('jf-phone'); if (phoneEl) phoneEl.value = employer.mobile || '';
  })();

  async function generateJD() {
    const input=document.getElementById('ai-jd-input').value.trim(); if(!input) return;
    const box=document.getElementById('ai-jd-response'); box.style.display='block';
    box.innerHTML='<span class="ai-loading">Writing job description...</span>';
    const answer=await callGroq(`Write a professional job description for: "${input}". Format: Role Summary (2 lines), Key Responsibilities (4 bullet points), Required Skills (4 items). Plain text only, no markdown.`);
    box.textContent=answer; document.getElementById('jf-description').value=answer;
  }

  async function submitJob() {
    const company=document.getElementById('company').value.trim();
    const email=document.getElementById('email').value.trim();
    const d=JobForm.collect();
    const errEl=document.getElementById('err-msg'); const successEl=document.getElementById('success-msg');
    errEl.style.display='none'; successEl.style.display='none';

    const fieldErr = JobForm.validate(d);
    if (fieldErr) { errEl.textContent=fieldErr; errEl.style.display='block'; return; }
    if (!company || !email) { errEl.textContent='Please enter your company name and contact email.'; errEl.style.display='block'; return; }

    // ── Slot enforcement: an active plan with a free slot (or a valid add-on). ──
    const gate = await canPostJob(employer);
    if (!gate.allowed) { showSlotModal(gate); return; }

    const btn=document.querySelector('.btn-primary'); btn.textContent='Posting...'; btn.disabled=true;
    const result=await JobsDB.postJob({
      title:d.title, company, location:d.location, pincode:d.pincode, city:d.city, subcity:d.subcity,
      jobType:d.jobType, salary:d.salary, experience:d.experience, skills:d.skills,
      application_deadline:d.application_deadline, openings:d.openings,
      phone:d.phone, description:d.description, email,
      employerId:employer.id, dayLimit:employer.day_limit||15
    });
    if(!result.ok){
      btn.textContent='Post Job for Free'; btn.disabled=false;
      if(/JOB_SLOTS_FULL/.test(result.msg||'')){ showSlotModal(await canPostJob(employer)); return; }
      errEl.textContent=result.msg; errEl.style.display='block'; return;
    }
    successEl.textContent='✅ Job posted successfully! It is now live on HireTrack.'; successEl.style.display='block';
    btn.textContent='Posted ✓';
    // Fire-and-forget: job posted confirmation to employer + candidate alerts
    fetch('/api/email?action=job-posted', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: employer.email,
        contactName: employer.contact_name || employer.company,
        jobTitle: d.title,
        company,
        location: d.location,
        jobType: d.jobType,
        salary: d.salary,
        dayLimit: employer.day_limit || 15
      })
    }).catch(() => {});
    fetch('/api/email?action=trigger-alerts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: d.title, company, location: d.location, salary: d.salary, jobType: d.jobType, skills: d.skills, jobId: result.job?.id })
    }).catch(() => {});
    setTimeout(()=>window.location.href='employer-dashboard.html',1500);
  }

  // ── Slot gate: active plan + a free slot (plan job_limit + valid add-ons). ──
  async function canPostJob(emp) {
    const now = new Date();
    if (!emp.plan || (emp.plan === 'free' && !emp.is_free_trial)) return { allowed:false, reason:'no_plan' };
    if (emp.plan_expires_at && new Date(emp.plan_expires_at) < now) return { allowed:false, reason:'plan_expired' };
    const q = window.sbQuery || sb;
    const { data: jobs } = await q.from('jobs').select('id,expires_at').eq('employer_id', emp.id).eq('delisted', false);
    const active = (jobs || []).filter(j => !j.expires_at || new Date(j.expires_at) > now).length;
    const { data: addons } = await q.from('addon_posts').select('id,valid_until').eq('employer_id', emp.id);
    const validAddons = (addons || []).filter(a => new Date(a.valid_until) > now).length;
    const planSlots = emp.job_limit || 1;
    if (active < planSlots + validAddons) return { allowed:true };
    return { allowed:false, reason:'slots_full', slots: planSlots, addons: validAddons };
  }

  function showSlotModal(gate) {
    document.getElementById('slot-modal')?.remove();
    const emp = employer || Session.getEmployer() || {};
    const paid = ['basic','growth','pro'].includes(emp.plan);
    let title, msg, buttons;
    const upgrade = `<a href="/pricing.html" style="display:inline-block;background:#10b981;color:#fff;text-decoration:none;padding:0.7rem 1.4rem;border-radius:10px;font-weight:700;font-size:0.9rem;">Upgrade Plan →</a>`;
    if (gate.reason === 'no_plan') {
      title = 'Purchase a plan to post jobs';
      msg = 'Choose a plan to start posting jobs on HireTrack. Plans start at ₹499/month.';
      buttons = `<a href="/pricing.html" style="display:inline-block;background:#10b981;color:#fff;text-decoration:none;padding:0.7rem 1.4rem;border-radius:10px;font-weight:700;font-size:0.9rem;">View Plans →</a>`;
    } else if (gate.reason === 'plan_expired') {
      title = 'Your plan has expired';
      msg = 'Renew your plan to continue posting jobs. Your existing listings and applicant data are preserved.';
      buttons = `<a href="/pricing.html" style="display:inline-block;background:#10b981;color:#fff;text-decoration:none;padding:0.7rem 1.4rem;border-radius:10px;font-weight:700;font-size:0.9rem;">Renew Plan →</a>`;
    } else {
      title = 'All job slots in use';
      msg = `Your ${emp.plan || 'current'} plan allows ${gate.slots} active job post${gate.slots>1?'s':''}${gate.addons?` (+${gate.addons} add-on)`:''}. Upgrade your plan${paid?' or add one post for ₹199':''}.`;
      buttons = upgrade + (paid ? ` <button onclick="buyAddonAndPost()" style="background:#0f172a;color:#fff;border:none;padding:0.7rem 1.4rem;border-radius:10px;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:inherit;">Add 1 Post — ₹199</button>` : '');
    }
    document.body.insertAdjacentHTML('beforeend', `
      <div id="slot-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;" onclick="if(event.target===this)this.remove()">
        <div style="background:#fff;border-radius:16px;padding:2rem;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.2);text-align:center;" onclick="event.stopPropagation()">
          <div style="font-size:2.2rem;margin-bottom:0.5rem;">🚀</div>
          <h3 style="font-size:1.1rem;font-weight:800;color:#0f172a;margin:0 0 0.5rem;">${title}</h3>
          <p style="font-size:0.88rem;color:#64748b;margin:0 0 1.4rem;line-height:1.6;">${msg}</p>
          <div style="display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;">${buttons}</div>
          <button onclick="document.getElementById('slot-modal').remove()" style="margin-top:1rem;background:none;border:none;color:#94a3b8;font-size:0.82rem;cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
      </div>`);
  }

  // Buy a ₹199 add-on, then post immediately (requires an active paid plan).
  async function buyAddonAndPost() {
    const emp = Session.getEmployer();
    document.getElementById('slot-modal')?.remove();
    if (!['basic','growth','pro'].includes(emp.plan)) { showToast('Add-on posts require an active paid plan.'); return; }
    let rzpKey, orderId;
    try {
      const r = await fetch('/api/payments?action=addon-order', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ employerId: emp.id }) });
      const cfg = await r.json();
      if (!cfg.ok || !cfg.key || !cfg.orderId) throw new Error(cfg.error || 'Order failed');
      rzpKey = cfg.key; orderId = cfg.orderId;
    } catch (e) { showToast('Payment service unavailable. Please try again.'); return; }
    const options = {
      key: rzpKey, amount: (199 + Math.round(199 * 0.18)) * 100, currency: 'INR', order_id: orderId,
      name: 'HireTrack', description: 'Add-on Job Post', image: 'https://www.hiretrack.co.in/og-image.png',
      prefill: { name: emp.contact_name, email: emp.email, contact: emp.mobile },
      theme: { color: '#10b981' },
      handler: async function(response) {
        try {
          const vr = await fetch('/api/payments?action=addon-verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ razorpay_payment_id: response.razorpay_payment_id, razorpay_order_id: response.razorpay_order_id, razorpay_signature: response.razorpay_signature, employerId: emp.id }) });
          const result = await vr.json();
          if (result.ok) { showToast('✅ Add-on added! Posting your job…'); submitJob(); }
          else { showToast(result.error || 'Add-on activation failed. Contact support.'); }
        } catch (e) { showToast('Payment received but activation failed. Contact support.'); }
      },
      modal: { ondismiss: function() { showToast('Payment cancelled.'); } }
    };
    const rzp = new Razorpay(options);
    rzp.on('payment.failed', () => showToast('Payment failed. Please try again.'));
    rzp.open();
  }

</script>
<script>(function(){var _cy=document.getElementById("copy-year");if(_cy)_cy.textContent=new Date().getFullYear();})();</script>
</body>
</html>
