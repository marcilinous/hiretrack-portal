<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Dashboard — HireTrack</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</head>
<body>

<div id="navbar"></div>
<div class="page-hd">
  <h1 id="dash-company-name">Employer Dashboard</h1>
  <p>Manage your job postings and review applicants</p>
</div>

<div class="dash-wrap">
  <div class="dash-stats">
    <div class="dash-stat"><strong id="stat-jobs">0</strong><span>Jobs Posted</span></div>
    <div class="dash-stat"><strong id="stat-apps">0</strong><span>Total Applicants</span></div>
    <div class="dash-stat"><strong id="stat-active">0</strong><span>Active Listings</span></div>
  </div>

  <div class="dash-jobs">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
      <h2>Your Job Postings</h2>
      <a href="post-job.html" style="background:var(--blue);color:#fff;padding:0.5rem 1.1rem;border-radius:8px;font-size:0.85rem;font-weight:700;">+ Post New Job</a>
    </div>
    <div id="dash-jobs-list">
      <div class="empty-state"><div class="es-icon">📋</div><p>No jobs posted yet.<br><a href="post-job.html" style="color:var(--blue);font-weight:600;">Post your first job →</a></p></div>
    </div>
  </div>
</div>

<footer><p>© 2025 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>

<script src="app.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('');

  const employer = Auth.getCurrentEmployer();
  if (!employer) { window.location.href = 'employer-auth.html'; }

  function loadDashboard() {
    document.getElementById('dash-company-name').textContent = employer.company + ' — Dashboard';

    const allEmpJobs = Auth.getEmployerJobs();
    const myJobs = allEmpJobs.filter(j => j.employerId === employer.id);

    let totalApps = 0;
    myJobs.forEach(j => { totalApps += Auth.getJobApplications(j.id).length; });

    document.getElementById('stat-jobs').textContent = myJobs.length;
    document.getElementById('stat-apps').textContent = totalApps;
    document.getElementById('stat-active').textContent = myJobs.length;

    if (!myJobs.length) return;

    document.getElementById('dash-jobs-list').innerHTML = myJobs.map(job => {
      const apps = Auth.getJobApplications(job.id);
      return `<div>
        <div class="dash-job-row">
          <div class="djr-info">
            <h4>${job.title}</h4>
            <p>📍 ${job.location} · ${job.jobType} · Posted ${new Date(job.postedAt).toLocaleDateString('en-IN')}</p>
          </div>
          <div class="djr-actions">
            <span style="font-size:0.8rem;color:var(--gray5);margin-right:4px;">${apps.length} applicant${apps.length!==1?'s':''}</span>
            <button class="btn-view-apps" onclick="toggleApplicants('apps-${job.id}', this)">${apps.length?'View Applicants':'No Applicants'}</button>
            <button class="btn-delete" onclick="deleteJob(${job.id})">Delete</button>
          </div>
        </div>
        <div class="applicants-panel" id="apps-${job.id}">
          ${apps.length ? apps.map(a => {
            const c = a.candidate;
            if (!c) return '';
            return `<div class="applicant-row">
              <div class="ar-info">
                <h5>${c.name}</h5>
                <p>${c.jobtitle||'Job Seeker'} · ${c.experience||'—'} · ${c.city||'—'} · ${(c.skills||[]).slice(0,3).join(', ')}</p>
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <select onchange="updateStatus(${a.candidateId},${job.id},this.value)" style="border:1px solid var(--gray3);border-radius:6px;padding:0.3rem 0.5rem;font-size:0.78rem;font-family:inherit;outline:none;">
                  <option ${a.status==='Applied'?'selected':''}>Applied</option>
                  <option ${a.status==='Viewed'?'selected':''}>Viewed</option>
                  <option ${a.status==='Shortlisted'?'selected':''}>Shortlisted</option>
                  <option ${a.status==='Rejected'?'selected':''}>Rejected</option>
                </select>
                ${c.resumeData ? `<button class="btn-dl-resume" onclick="downloadResume('${c.id}')">📄 Resume</button>` : '<span style="font-size:0.75rem;color:var(--gray4);">No resume</span>'}
              </div>
            </div>`;
          }).join('') : '<p style="text-align:center;color:var(--gray4);font-size:0.85rem;padding:1rem;">No applicants yet.</p>'}
        </div>
      </div>`;
    }).join('');
  }

  function toggleApplicants(id, btn) {
    const panel = document.getElementById(id);
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? 'View Applicants' : 'Hide Applicants';
  }

  function deleteJob(jobId) {
    if (!confirm('Are you sure you want to delete this job posting?')) return;
    Auth.deleteEmployerJob(jobId);
    loadDashboard();
    showToast('Job deleted successfully.');
  }

  function updateStatus(candidateId, jobId, status) {
    const apps = Auth.getApplications();
    const app = apps.find(a => a.candidateId === candidateId && a.jobId === jobId);
    if (app) { app.status = status; Auth.saveApplications(apps); showToast(`Status updated to ${status}`); }
  }

  function downloadResume(candidateId) {
    const candidates = Auth.getCandidates();
    const c = candidates.find(x => x.id === parseInt(candidateId));
    if (!c || !c.resumeData) return;
    const a = document.createElement('a');
    a.href = c.resumeData;
    a.download = c.resumeName || `${c.name}_resume.pdf`;
    a.click();
  }

  loadDashboard();
</script>
</body>
</html>
