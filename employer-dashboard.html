<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Dashboard — HireTrack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar"></div>
<div class="page-hd"><h1 id="dash-company-name">Employer Dashboard</h1><p>Manage your job postings and review applicants</p></div>

<div class="dash-wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <div><h2 id="dash-welcome" style="font-size:1rem;color:var(--gray5);font-weight:500;">Welcome back 👋</h2></div>
    <button onclick="EmployerAuth.logout()" style="background:#fee2e2;color:#b91c1c;border:none;padding:0.6rem 1.2rem;border-radius:9px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;">🚪 Logout</button>
  </div>
  <div class="dash-stats">
    <div class="dash-stat"><strong id="stat-jobs">0</strong><span>Jobs Posted</span></div>
    <div class="dash-stat"><strong id="stat-apps">0</strong><span>Total Applicants</span></div>
    <div class="dash-stat"><strong id="stat-active">0</strong><span>Active Listings</span></div>
  </div>
  <div class="dash-jobs">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
      <h2>Your Job Postings</h2>
      <a href="post-job.html" style="background:var(--blue);color:#fff;padding:0.5rem 1.1rem;border-radius:8px;font-size:0.85rem;font-weight:700;">+ Post New Job</a>
    </div>
    <div id="dash-jobs-list"><div class="loading-spinner">Loading your jobs...</div></div>
  </div>
</div>

<footer><p>© 2025 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('dashboard');
  const employer = Session.getEmployer();
  if (!employer) window.location.href = 'employer-auth.html';

  async function loadDashboard() {
    document.getElementById('dash-company-name').textContent = employer.company;
    document.getElementById('dash-welcome').textContent = `Welcome back, ${employer.contact_name.split(' ')[0]} 👋`;

    const myJobs = await JobsDB.getEmployerJobs(employer.id);
    const activeJobs = myJobs.filter(j => !j.delisted && (!j.expires_at || new Date() < new Date(j.expires_at)));
    let totalApps = 0;
    for (const j of myJobs) { const apps = await ApplicationsDB.getJobApplications(j.id); totalApps += apps.length; }
    document.getElementById('stat-jobs').textContent = myJobs.length;
    document.getElementById('stat-apps').textContent = totalApps;
    document.getElementById('stat-active').textContent = activeJobs.length;

    if (!myJobs.length) {
      document.getElementById('dash-jobs-list').innerHTML = '<div class="empty-state"><div class="es-icon">📋</div><p>No jobs posted yet.<br><a href="post-job.html" style="color:var(--blue);font-weight:600;">Post your first job →</a></p></div>';
      return;
    }

    const currentPlan = employer.plan || 'free';
    const extendLabel = currentPlan === 'free' ? '⏳ Extend 15d 🔒' : '⏳ Extend 15d';

    const rows = await Promise.all(myJobs.map(async job => {
      const apps = await ApplicationsDB.getJobApplications(job.id);
      const isExpired = job.expires_at && new Date() > new Date(job.expires_at);
      const isDelisted = job.delisted;
      const daysLeft = job.expires_at ? Math.ceil((new Date(job.expires_at)-new Date())/(1000*60*60*24)) : null;
      const expiryColor = isExpired?'#ef4444':daysLeft<=3?'#f97316':'#22c55e';
      const expiryText = isExpired?'Expired':`Expires in ${daysLeft}d`;
      const statusLabel = isDelisted?'⛔ Delisted':isExpired?'🔴 Expired':'🟢 Active';

      const appsHTML = apps.length ? apps.map(a => {
        const c = a.candidates;
        if (!c) return '';
        return `<div class="applicant-row">
          <div class="ar-info"><h5>${c.name}</h5><p>${c.jobtitle||'Job Seeker'} · ${c.experience||'—'} · ${c.city||'—'} · ${(c.skills||[]).slice(0,3).join(', ')}</p></div>
          <div style="display:flex;gap:8px;align-items:center;">
            <select onchange="updateStatus('${a.candidate_id}','${job.id}',this.value)" style="border:1px solid var(--gray3);border-radius:6px;padding:0.3rem 0.5rem;font-size:0.78rem;font-family:inherit;outline:none;">
              <option ${a.status==='Applied'?'selected':''}>Applied</option>
              <option ${a.status==='Viewed'?'selected':''}>Viewed</option>
              <option ${a.status==='Shortlisted'?'selected':''}>Shortlisted</option>
              <option ${a.status==='Rejected'?'selected':''}>Rejected</option>
            </select>
            ${c.resume_data?`<button class="btn-dl-resume" onclick="downloadResume('${c.id}','${c.resume_name||'resume.pdf'}','${c.name}')">📄 Resume</button>`:'<span style="font-size:0.75rem;color:var(--gray4);">No resume</span>'}
          </div>
        </div>`;
      }).join('') : '<p style="text-align:center;color:var(--gray4);font-size:0.85rem;padding:1rem;">No applicants yet.</p>';

      return `<div>
        <div class="dash-job-row" style="opacity:${isDelisted?'0.6':'1'}">
          <div class="djr-info">
            <h4>${job.title} <span style="font-size:0.75rem;font-weight:500;color:${isDelisted?'#ef4444':isExpired?'#ef4444':'#22c55e'}">${statusLabel}</span></h4>
            <p>📍 ${job.location} · ${job.job_type} · Posted ${new Date(job.posted_at).toLocaleDateString('en-IN')}${job.expires_at?` · <span style="color:${expiryColor}">⏱ ${expiryText}</span>`:''}</p>
          </div>
          <div class="djr-actions" style="flex-wrap:wrap;gap:6px;">
            <span style="font-size:0.8rem;color:var(--gray5);">${apps.length} applicant${apps.length!==1?'s':''}</span>
            <button class="btn-view-apps" onclick="toggleApplicants('apps-${job.id}',this)">${apps.length?'View':'No Applicants'}</button>
            <button class="btn-extend" onclick="extendJob('${job.id}','${job.expires_at||''}')" title="${currentPlan==='free'?'Upgrade to extend':'Extend by 15 days'}">${extendLabel}</button>
            <button class="btn-delist ${isDelisted?'btn-relist':''}" onclick="toggleDelist('${job.id}',${!isDelisted})">${isDelisted?'🔁 Relist':'⛔ Delist'}</button>
            <button class="btn-delete" onclick="deleteJob('${job.id}')">🗑 Delete</button>
          </div>
        </div>
        <div class="applicants-panel" id="apps-${job.id}">${appsHTML}</div>
      </div>`;
    }));

    document.getElementById('dash-jobs-list').innerHTML = rows.join('');
  }

  function toggleApplicants(id, btn) {
    const panel = document.getElementById(id);
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? (btn.textContent.includes('No')?'No Applicants':'View Applicants') : 'Hide Applicants';
  }

  async function extendJob(jobId, currentExpiry) {
    const currentPlan = employer.plan || 'free';
    if (currentPlan === 'free') { if(confirm('Extending requires a paid plan. View pricing?')) window.location.href='pricing.html'; return; }
    if (!confirm('Extend this job by 15 more days?')) return;
    await JobsDB.extendJob(jobId, currentExpiry);
    showToast('✅ Job extended by 15 days!'); loadDashboard();
  }

  async function toggleDelist(jobId, delist) {
    const action = delist ? 'delist' : 'relist';
    if (!confirm(`Are you sure you want to ${action} this job?`)) return;
    await JobsDB.updateJob(jobId, { delisted: delist });
    showToast(delist ? '⛔ Job delisted.' : '✅ Job relisted!'); loadDashboard();
  }

  async function deleteJob(jobId) {
    if (!confirm('Delete this job posting permanently?')) return;
    await JobsDB.deleteJob(jobId);
    showToast('Job deleted!'); loadDashboard();
  }

  async function updateStatus(candidateId, jobId, status) {
    await ApplicationsDB.updateStatus(candidateId, jobId, status);
    showToast(`Status updated to ${status}`);
  }

  async function downloadResume(candidateId, resumeName, candidateName) {
    const { data } = await sb.from('candidates').select('resume_data,resume_name').eq('id', candidateId).single();
    if (!data?.resume_data) return;
    const a = document.createElement('a'); a.href = data.resume_data; a.download = data.resume_name || `${candidateName}_resume.pdf`; a.click();
  }

  loadDashboard();
</script>
</body>
</html>
