<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Dashboard — HireTrack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="navbar"></div>
<div class="page-hd">
  <h1 id="dash-company-name">Employer Dashboard</h1>
  <p>Manage your job postings and review applicants</p>
</div>

<div class="dash-wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <div>
      <h2 id="dash-welcome" style="font-size:1rem;color:var(--gray5);font-weight:500;">Welcome back 👋</h2>
    </div>
    <button onclick="logoutEmployer()" style="background:#fee2e2;color:#b91c1c;border:none;padding:0.6rem 1.2rem;border-radius:9px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;">🚪 Logout</button>
  </div>
  <div class="dash-stats">
    <div class="dash-stat"><strong id="stat-jobs">0</strong><span>Jobs Posted</span></div>
    <div class="dash-stat"><strong id="stat-apps">0</strong><span>Total Applicants</span></div>
    <div class="dash-stat"><strong id="stat-active">0</strong><span>Active Listings</span></div>
  </div>

  <div class="dash-jobs">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
      <h2>Your Job Postings</h2>
      <a href="post-job.html" style="background:var(--blue);color:#fff;padding:0.5rem 1.1rem;border-radius:8px;font-size:0.85rem;font-weight:700;">+ Post New Job</a>
    </div>
    <div id="dash-jobs-list">
      <div class="empty-state"><div class="es-icon">📋</div><p>No jobs posted yet.<br><a href="post-job.html" style="color:var(--blue);font-weight:600;">Post your first job →</a></p></div>
    </div>
  </div>
</div>

<footer><p>© 2025 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>

<script src="app.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('');

  const employer = Auth.getCurrentEmployer();
  Auth.saveEmployerJobs = function(jobs) { localStorage.setItem('ht_employer_jobs', JSON.stringify(jobs)); };
  if (!employer) { window.location.href = 'employer-auth.html'; }

  function loadDashboard() {
    document.getElementById('dash-company-name').textContent = employer.company;
    document.getElementById('dash-welcome').textContent = `Welcome back, ${employer.contactName.split(' ')[0]} 👋`;

    const allEmpJobs = Auth.getEmployerJobs();
    const myJobs = allEmpJobs.filter(j => j.employerId === employer.id);

    let totalApps = 0;
    myJobs.forEach(j => { totalApps += Auth.getJobApplications(j.id).length; });

    document.getElementById('stat-jobs').textContent = myJobs.length;
    document.getElementById('stat-apps').textContent = totalApps;
    document.getElementById('stat-active').textContent = myJobs.length;

    if (!myJobs.length) return;

            const plans = JSON.parse(localStorage.getItem('ht_employer_plans') || '{}');
            const planData = plans[employer.id];
            const currentPlan = (!planData || new Date() > new Date(planData.expiresAt)) ? 'free' : planData.plan;
            const extendLabel = currentPlan === 'free' ? '⏳ Extend 15d 🔒' : '⏳ Extend 15d';
      const apps = Auth.getJobApplications(job.id);
      const isExpired = job.expiresAt && new Date() > new Date(job.expiresAt);
      const isDelisted = job.delisted === true;
      const daysLeft = job.expiresAt ? Math.ceil((new Date(job.expiresAt) - new Date()) / (1000*60*60*24)) : null;
      const expiryColor = isExpired ? '#ef4444' : daysLeft <= 3 ? '#f97316' : '#22c55e';
      const expiryText = isExpired ? 'Expired' : `Expires in ${daysLeft}d`;
      const statusLabel = isDelisted ? '⛔ Delisted' : isExpired ? '🔴 Expired' : '🟢 Active';

      return `<div>
        <div class="dash-job-row" style="opacity:${isDelisted?'0.6':'1'};">
          <div class="djr-info">
            <h4>${job.title} <span style="font-size:0.75rem;font-weight:500;color:${isDelisted?'#ef4444':isExpired?'#ef4444':'#22c55e'}">${statusLabel}</span></h4>
            <p>📍 ${job.location} · ${job.jobType} · Posted ${new Date(job.postedAt).toLocaleDateString('en-IN')}
            ${job.expiresAt ? `· <span style="color:${expiryColor}">⏱ ${expiryText}</span>` : ''}</p>
          </div>
          <div class="djr-actions" style="flex-wrap:wrap;gap:6px;">
            <span style="font-size:0.8rem;color:var(--gray5);">${apps.length} applicant${apps.length!==1?'s':''}</span>
            <button class="btn-view-apps" onclick="toggleApplicants('apps-${job.id}', this)">${apps.length?'View':'No Applicants'}</button>
            <button class="btn-extend" onclick="extendJob(${job.id})" title="${currentPlan === 'free' ? 'Upgrade to paid plan to extend' : 'Extend by 15 more days'}">${extendLabel}</button>
            <button class="btn-delist ${isDelisted?'btn-relist':''}" onclick="toggleDelist(${job.id})">${isDelisted?'🔁 Relist':'⛔ Delist'}</button>
            <button class="btn-delete" onclick="deleteJob(${job.id})">🗑 Delete</button>
          </div>
        </div>
        <div class="applicants-panel" id="apps-${job.id}">
          ${apps.length ? apps.map(a => {
            const c = a.candidate;
            if (!c) return '';
            return `<div class="applicant-row">
              <div class="ar-info">
                <h5>${c.name}</h5>
                <p>${c.jobtitle||'Job Seeker'} · ${c.experience||'—'} · ${c.city||'—'} · ${(c.skills||[]).slice(0,3).join(', ')}</p>
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <select onchange="updateStatus(${a.candidateId},${job.id},this.value)" style="border:1px solid var(--gray3);border-radius:6px;padding:0.3rem 0.5rem;font-size:0.78rem;font-family:inherit;outline:none;">
                  <option ${a.status==='Applied'?'selected':''}>Applied</option>
                  <option ${a.status==='Viewed'?'selected':''}>Viewed</option>
                  <option ${a.status==='Shortlisted'?'selected':''}>Shortlisted</option>
                  <option ${a.status==='Rejected'?'selected':''}>Rejected</option>
                </select>
                ${c.resumeData ? `<button class="btn-dl-resume" onclick="downloadResume('${c.id}')">📄 Resume</button>` : '<span style="font-size:0.75rem;color:var(--gray4);">No resume</span>'}
              </div>
            </div>`;
          }).join('') : '<p style="text-align:center;color:var(--gray4);font-size:0.85rem;padding:1rem;">No applicants yet.</p>'}
        </div>
      </div>`;
    }).join('');
  }

  function toggleApplicants(id, btn) {
    const panel = document.getElementById(id);
    const isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? 'View Applicants' : 'Hide Applicants';
  }

  function extendJob(jobId) {
    const plans = JSON.parse(localStorage.getItem('ht_employer_plans') || '{}');
    const planData = plans[employer.id];
    const currentPlan = (!planData || new Date() > new Date(planData.expiresAt)) ? 'free' : planData.plan;

    // Free plan — redirect to pricing
    if (currentPlan === 'free') {
      if (confirm('Extending beyond 15 days requires a paid plan. Would you like to view our pricing?')) {
        window.location.href = 'pricing.html';
      }
      return;
    }

    // Paid plan — allow extension
    if (!confirm('Extend this job listing by 15 more days?')) return;
    const jobs = Auth.getEmployerJobs();
    const job = jobs.find(j => j.id === jobId);
    if (!job) return;
    const base = job.expiresAt && new Date(job.expiresAt) > new Date() ? new Date(job.expiresAt) : new Date();
    base.setDate(base.getDate() + 15);
    job.expiresAt = base.toISOString();
    job.delisted = false;
    Auth.saveEmployerJobs(jobs);
    loadDashboard();
    showToast('✅ Job extended by 15 days!');
  }

  function toggleDelist(jobId) {
    const jobs = Auth.getEmployerJobs();
    const job = jobs.find(j => j.id === jobId);
    if (!job) return;
    const action = job.delisted ? 'relist' : 'delist';
    if (!confirm(`Are you sure you want to ${action} this job? ${action === 'delist' ? 'It will be hidden from candidates.' : 'It will be visible to candidates again.'}`)) return;
    job.delisted = !job.delisted;
    Auth.saveEmployerJobs(jobs);
    loadDashboard();
    showToast(job.delisted ? '⛔ Job delisted successfully.' : '✅ Job relisted successfully!');
  }

  function deleteJob(jobId) {
    if (!confirm('Are you sure you want to delete this job posting?')) return;
    Auth.deleteEmployerJob(jobId);
    loadDashboard();
    showToast('Job deleted successfully.');
  }

  function updateStatus(candidateId, jobId, status) {
    const apps = Auth.getApplications();
    const app = apps.find(a => a.candidateId === candidateId && a.jobId === jobId);
    if (app) { app.status = status; Auth.saveApplications(apps); showToast(`Status updated to ${status}`); }
  }

  function downloadResume(candidateId) {
    const candidates = Auth.getCandidates();
    const c = candidates.find(x => x.id === parseInt(candidateId));
    if (!c || !c.resumeData) return;
    const a = document.createElement('a');
    a.href = c.resumeData;
    a.download = c.resumeName || `${c.name}_resume.pdf`;
    a.click();
  }

  loadDashboard();
</script>
</body>
</html>
