<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay — HireTrack</title>
<meta name="robots" content="noindex">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .card { background:#fff; border-radius:18px; padding:2rem; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.35); }
  .logo { font-size:1.4rem; font-weight:800; color:#0f172a; text-align:center; margin-bottom:0.3rem; }
  .logo span { color:#2563eb; }
  .sub { text-align:center; color:#64748b; font-size:0.85rem; margin-bottom:1.5rem; }
  .amount { text-align:center; font-size:2.6rem; font-weight:800; color:#0f172a; margin:0.5rem 0 0.2rem; }
  .meta { text-align:center; color:#64748b; font-size:0.85rem; margin-bottom:1.5rem; }
  .meta strong { color:#0f172a; }
  .btn { width:100%; background:#2563eb; color:#fff; border:none; padding:0.95rem; font-size:1rem; font-weight:700; border-radius:11px; cursor:pointer; font-family:inherit; transition:background 0.2s; }
  .btn:hover { background:#1d4ed8; }
  .btn:disabled { opacity:0.6; cursor:default; }
  .note { text-align:center; font-size:0.75rem; color:#94a3b8; margin-top:1rem; }
  .state { text-align:center; padding:1rem 0; }
  .state .ico { font-size:2.6rem; margin-bottom:0.6rem; }
  .state h2 { font-size:1.15rem; font-weight:800; color:#0f172a; margin-bottom:0.4rem; }
  .state p { color:#64748b; font-size:0.88rem; }
  .ok { color:#15803d; }
  .err { color:#dc2626; }
  .spinner { display:inline-block; width:30px; height:30px; border:3px solid #e2e8f0; border-top-color:#2563eb; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Hire<span>Track</span></div>
  <div class="sub">Secure Payment</div>
  <div id="content"><div class="state"><div class="spinner"></div><p style="margin-top:0.8rem;color:#64748b;">Loading…</p></div></div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  const API = '/api/payments';
  const slug = new URLSearchParams(location.search).get('slug') || location.pathname.split('/pay/')[1] || '';
  const content = document.getElementById('content');
  let _info = null;

  async function api(action, payload) {
    const r = await fetch(`${API}?action=${action}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload || {}),
    });
    return r.json().catch(() => ({ ok: false, error: 'Server error' }));
  }

  function showError(msg) {
    content.innerHTML = `<div class="state"><div class="ico">⚠️</div><h2 class="err">Unable to load</h2><p>${msg}</p></div>`;
  }
  function showPaid() {
    content.innerHTML = `<div class="state"><div class="ico ok">✅</div><h2 class="ok">Payment Successful</h2><p>Thank you! Your plan is now active. You can close this page.</p></div>`;
  }

  function renderPay() {
    const days = _info.validity_days;
    content.innerHTML = `
      <div class="amount">₹${Number(_info.amount).toLocaleString('en-IN')}</div>
      <div class="meta">${_info.company ? `<strong>${escapeHtml(_info.company)}</strong> · ` : ''}${days}-day plan</div>
      <button class="btn" id="pay-btn">Pay ₹${Number(_info.amount).toLocaleString('en-IN')} securely</button>
      <div class="note">🔒 Payments processed securely via Razorpay</div>`;
    document.getElementById('pay-btn').addEventListener('click', startPayment);
  }

  async function startPayment() {
    const btn = document.getElementById('pay-btn');
    btn.disabled = true; btn.textContent = 'Starting…';
    const order = await api('paylink-order', { slug });
    if (!order.ok) { btn.disabled = false; btn.textContent = 'Try again'; alert(order.error || 'Could not start payment.'); return; }

    const rzp = new Razorpay({
      key: order.key,
      order_id: order.orderId,
      amount: order.amount,
      currency: 'INR',
      name: 'HireTrack',
      description: `${_info.validity_days}-day plan${_info.company ? ' · ' + _info.company : ''}`,
      theme: { color: '#2563eb' },
      handler: async function (resp) {
        content.innerHTML = `<div class="state"><div class="spinner"></div><p style="margin-top:0.8rem;color:#64748b;">Confirming payment…</p></div>`;
        const v = await api('paylink-verify', {
          slug,
          razorpay_payment_id: resp.razorpay_payment_id,
          razorpay_order_id: resp.razorpay_order_id,
          razorpay_signature: resp.razorpay_signature,
        });
        if (v.ok) showPaid();
        else showError(v.error || 'We could not confirm your payment. If you were charged, contact support.');
      },
      modal: { ondismiss: function () { btn.disabled = false; btn.textContent = `Pay ₹${Number(_info.amount).toLocaleString('en-IN')} securely`; } },
    });
    rzp.on('payment.failed', function () { btn.disabled = false; btn.textContent = 'Payment failed — try again'; });
    rzp.open();
  }

  function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  (async function init() {
    if (!slug) { showError('Invalid payment link.'); return; }
    const info = await api('paylink-info', { slug });
    if (!info.ok) { showError(info.error || 'This payment link is invalid or has expired.'); return; }
    if (info.is_paid) { showPaid(); return; }
    _info = info;
    renderPay();
  })();
</script>
</body>
</html>
