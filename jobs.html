<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Jobs — HireTrack</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<style>
.jd-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.jd-modal.show{display:flex;}
.jd-box{background:#fff;border-radius:16px;width:100%;max-width:660px;padding:2rem;position:relative;margin:auto;}
.jd-close{position:absolute;top:1rem;right:1rem;background:var(--gray2);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;}
.jd-title{font-size:1.3rem;font-weight:800;margin-bottom:0.3rem;}
.jd-company{color:var(--gray5);font-size:0.92rem;margin-bottom:1rem;}
.jd-meta-row{display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;}
.jd-meta-item{background:var(--gray2);padding:0.35rem 0.9rem;border-radius:20px;font-size:0.8rem;color:var(--gray5);font-weight:500;}
.jd-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.2rem;}
.jd-desc{font-size:0.92rem;line-height:1.75;color:var(--navy2);white-space:pre-wrap;border-top:1px solid var(--gray3);padding-top:1rem;margin-bottom:1.2rem;}
.jd-actions{display:flex;gap:10px;}
</style>
</head>
<body>
<div id="navbar"></div>
<div class="page-hd"><h1>Browse All Jobs</h1><p>Thousands of opportunities across all industries and cities</p></div>

<div class="jobs-layout">
  <aside class="filter-panel">
    <h3>Filter Jobs</h3>
    <div class="fg"><label>Keyword</label><input type="text" id="f-keyword" placeholder="Title or skill..." /></div>
    <div class="fg"><label>Location</label>
      <select id="f-location"><option value="">All India</option><option>Bengaluru</option><option>Mumbai</option><option>Delhi</option><option>Hyderabad</option><option>Chennai</option><option>Pune</option><option>Kolkata</option><option>Ahmedabad</option><option>Mysuru</option><option>Mangaluru</option><option>Remote</option></select>
    </div>
    <div class="fg"><label>Job Type</label>
      <select id="f-type"><option value="">All Types</option><option>Full Time</option><option>Contract</option><option>Remote</option></select>
    </div>
    <div class="fg"><label>Category</label>
      <select id="f-category"><option value="">All Categories</option><option value="Data Analyst">Data Analyst</option><option value="IT">IT & Software</option><option value="Sales">Sales</option><option value="Marketing">Marketing</option><option value="Finance">Finance & Accounts</option><option value="HR">HR & Recruitment</option><option value="Operations">Operations</option><option value="Logistics">Logistics</option><option value="MIS">MIS</option><option value="Excel">Excel</option><option value="SQL">SQL</option></select>
    </div>
    <button id="clear-btn" class="btn-filter" style="background:var(--gray3);color:var(--navy);margin-top:0.5rem;" onclick="clearFilters()">Clear Filters</button>
  </aside>

  <main>
    <div class="results-hd"><span id="results-count">Loading...</span></div>
    <div class="jobs-grid" id="jobs-container"></div>
  </main>
</div>

<!-- Job Modal -->
<div class="jd-modal" id="jd-modal" onclick="closeJobModal(event)">
  <div class="jd-box">
    <button class="jd-close" onclick="document.getElementById('jd-modal').classList.remove('show');document.body.style.overflow='';">✕</button>
    <div class="jd-title" id="jd-title"></div>
    <div class="jd-company" id="jd-company"></div>
    <div class="jd-meta-row" id="jd-meta"></div>
    <div class="jd-tags" id="jd-tags"></div>
    <div class="jd-desc" id="jd-desc"></div>
    <div class="jd-actions" id="jd-actions"></div>
  </div>
</div>

<footer><p>© 2025 <span>HireTrack</span> — Find Jobs Across India. Built with ❤️ in Bengaluru.</p></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('jobs');
  let allJobs = [], candidateApps = [];

  async function loadJobs() {
    const dbJobs = await JobsDB.getAllPublicJobs();
    window._employerJobs = dbJobs;
    allJobs = [...JOBS, ...dbJobs.map(j=>({...j,type:j.job_type}))];
    const candidate = Session.getCandidate();
    if (candidate) candidateApps = await ApplicationsDB.getCandidateApplications(candidate.id);
    applyFilters();
  }

  function applyFilters() {
    const keyword=document.getElementById('f-keyword').value.toLowerCase();
    const location=document.getElementById('f-location').value;
    const type=document.getElementById('f-type').value;
    const category=document.getElementById('f-category').value.toLowerCase();
    const filtered=allJobs.filter(j=>{
      const tags=Array.isArray(j.tags)?j.tags:(j.skills||'').split(',').map(s=>s.trim());
      const haystack=(j.title+j.company+tags.join(' ')).toLowerCase();
      const jtype=j.type||j.job_type||'';
      return(!keyword||haystack.includes(keyword))&&(!location||j.location===location)&&(!type||jtype===type)&&(!category||haystack.includes(category));
    });
    document.getElementById('results-count').textContent=`${filtered.length} job${filtered.length!==1?'s':''} found`;
    renderJobsWithModal(filtered, candidateApps);
    updateClearBtn();
  }

  function renderJobsWithModal(jobs, apps) {
    const container=document.getElementById('jobs-container');
    if(!jobs.length){container.innerHTML='<div class="empty-state"><div class="es-icon">🔍</div><p>No jobs found.</p></div>';return;}
    container.innerHTML=jobs.map(j=>renderJobCard(j,apps)).join('');
  }

  function clearFilters() {
    ['f-keyword','f-location','f-type','f-category'].forEach(id=>{const el=document.getElementById(id);el.tagName==='INPUT'?el.value='':el.selectedIndex=0;});
    applyFilters();
  }

  function updateClearBtn() {
    const btn=document.getElementById('clear-btn');
    const isActive=document.getElementById('f-keyword').value||document.getElementById('f-location').value||document.getElementById('f-type').value||document.getElementById('f-category').value;
    btn.style.background=isActive?'var(--blue)':'var(--gray3)';
    btn.style.color=isActive?'#fff':'var(--navy)';
    btn.textContent='Clear Filters';
  }

  document.getElementById('f-keyword').addEventListener('input',applyFilters);
  document.getElementById('f-location').addEventListener('change',applyFilters);
  document.getElementById('f-type').addEventListener('change',applyFilters);
  document.getElementById('f-category').addEventListener('change',applyFilters);

  function openJobModal(jobId) {
    const job=allJobs.find(j=>String(j.id)===String(jobId)); if(!job) return;
    // Track view for employer-posted jobs
    if (job.employer_id) {
      const currentViews = job.views || 0;
      sb.from('jobs').update({ views: currentViews + 1 }).eq('id', jobId);
      job.views = currentViews + 1;
    }
    const candidate=Session.getCandidate();
    const alreadyApplied=candidate&&candidateApps.find(a=>a.job_id===String(jobId));
    const typeClass={'Full Time':'badge-full','Contract':'badge-contract','Remote':'badge-remote'};
    const waMsg=encodeURIComponent(`Hi, I found your job posting for *${job.title}* at *${job.company}* on HireTrack. I would like to apply.`);
    const tags=Array.isArray(job.tags)?job.tags:(job.skills||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,3);
    const expired=isJobExpired(job);
    document.getElementById('jd-title').textContent=job.title;
    document.getElementById('jd-company').textContent=`🏢 ${job.company}`;
    document.getElementById('jd-meta').innerHTML=`<span class="jd-meta-item">📍 ${job.location}</span><span class="jd-meta-item">💰 ${job.salary||'Negotiable'}</span><span class="jd-meta-item badge ${typeClass[job.type||job.job_type]||'badge-full'}">${job.type||job.job_type}</span>`;
    document.getElementById('jd-tags').innerHTML=tags.map(t=>`<span class="tag">${t}</span>`).join('');
    document.getElementById('jd-desc').textContent=job.description||'Contact employer for full job description.';
    document.getElementById('jd-actions').innerHTML=`
      <button class="btn-whatsapp" onclick="whatsappApply('${job.phone}','${waMsg}')">WhatsApp Apply</button>
      <button class="btn-apply ${alreadyApplied?'applied':''} ${expired?'expired-btn':''}" style="flex:1;padding:0.8rem;" onclick="${expired?`showToast('This job has expired.')`:`applyJob('${job.id}',this)`}">${expired?'⚠ Expired':alreadyApplied?'✓ Applied':'Apply Now'}</button>`;
    document.getElementById('jd-modal').classList.add('show');
    document.body.style.overflow='hidden';
  }

  function closeJobModal(e) {
    if(e.target===document.getElementById('jd-modal')){document.getElementById('jd-modal').classList.remove('show');document.body.style.overflow='';}
  }

  document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('jd-modal').classList.remove('show');document.body.style.overflow='';}});

  const p=new URLSearchParams(window.location.search);
  if(p.get('search')) document.getElementById('f-keyword').value=p.get('search');
  if(p.get('cat')){const sel=document.getElementById('f-category');for(let o of sel.options)if(o.value.toLowerCase()===p.get('cat').toLowerCase()){sel.value=o.value;break;}}

  loadJobs();
</script>
</body>
</html>
