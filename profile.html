<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — HireTrack</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<style>
body { background:#f1f5f9; padding-top:0 !important; }

/* ── Top Bar ── */
.topbar { position:fixed; top:0; left:0; right:0; z-index:150; background:#0f172a; display:flex; align-items:center; padding:0 1rem; height:50px; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.tb-hamburger { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:#fff; width:34px; height:34px; border-radius:8px; font-size:1.15rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; line-height:1; }
.tb-hamburger:hover { background:rgba(255,255,255,0.22); }
.tb-brand { flex:1; color:#fff; font-family:'Plus Jakarta Sans',sans-serif; font-size:1.25rem; font-weight:800; padding-left:0.75rem; letter-spacing:-0.5px; text-decoration:none; }
.tb-brand span { color:#3b82f6; }
.tb-bell { position:relative; background:none; border:none; color:#fff; font-size:1.1rem; cursor:pointer; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:8px; flex-shrink:0; }
.tb-bell:hover { background:rgba(255,255,255,0.1); }
.bell-badge { position:absolute; top:3px; right:3px; background:#ef4444; color:#fff; border-radius:50%; min-width:16px; height:16px; font-size:0.58rem; font-weight:800; display:flex; align-items:center; justify-content:center; line-height:1; padding:0 2px; }

body { padding-top:50px !important; }

/* ── Content ── */
.content { max-width:900px; margin:1.5rem auto; padding:0 1.5rem; }

/* ── Profile Score ── */
.score-wrap { display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
.score-ring-wrap { position:relative; width:100px; height:100px; flex-shrink:0; }
.score-ring-wrap svg { transform:rotate(-90deg); }
.score-ring-bg { fill:none; stroke:#f1f5f9; stroke-width:8; }
.score-ring-fill { fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset 1s ease; }
.score-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-pct { font-size:1.4rem; font-weight:800; color:#0f172a; line-height:1; }
.score-label { font-size:0.6rem; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; }
.score-info { flex:1; min-width:200px; }
.score-info h3 { font-size:0.95rem; font-weight:800; margin-bottom:0.25rem; }
.score-info p { font-size:0.8rem; color:#64748b; margin-bottom:1rem; }
.score-items { display:flex; flex-direction:column; gap:0.5rem; }
.score-item { display:flex; align-items:center; justify-content:space-between; gap:0.75rem; padding:0.5rem 0.75rem; border-radius:8px; font-size:0.82rem; }
.score-item.done { background:#f0fdf4; }
.score-item.missing { background:#fef9c3; }
.score-item-left { display:flex; align-items:center; gap:8px; }
.score-item-icon { font-size:0.9rem; }
.score-item-label { font-weight:600; }
.score-item-pts { font-size:0.72rem; font-weight:700; }
.score-item.done .score-item-pts { color:#15803d; }
.score-item.missing .score-item-pts { color:#b45309; }
.btn-fix { background:#2563eb; color:#fff; border:none; padding:3px 10px; border-radius:6px; font-size:0.72rem; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
.score-level { display:inline-block; padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; margin-bottom:0.5rem; }
.level-starter { background:#fef3c7; color:#b45309; }
.level-good { background:#dbeafe; color:#1d4ed8; }
.level-pro { background:#f5f3ff; color:#6d28d9; }
.level-complete { background:#dcfce7; color:#15803d; }

/* ── Cards ── */
.card { background:#fff; border-radius:14px; border:1.5px solid #e2e8f0; padding:1.5rem; margin-bottom:1rem; }
.card h3 { font-size:0.88rem; font-weight:800; color:#0f172a; margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.3px; }
.card-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.card-hd h3 { margin-bottom:0; }
.card-add-btn { background:#eff6ff; color:#2563eb; border:1.5px solid #bfdbfe; border-radius:8px; padding:4px 10px; font-size:0.75rem; font-weight:700; cursor:pointer; font-family:inherit; }
.card-add-btn:hover { background:#dbeafe; }
.hist-entry { display:flex; align-items:flex-start; gap:0.75rem; padding:0.75rem 0; border-bottom:1px solid #f1f5f9; }
.hist-entry:last-child { border-bottom:none; padding-bottom:0; }
.hist-dot { width:9px; height:9px; border-radius:50%; background:#3b82f6; margin-top:5px; flex-shrink:0; }
.hist-body { flex:1; min-width:0; }
.hist-title { font-size:0.87rem; font-weight:700; color:#0f172a; }
.hist-sub { font-size:0.8rem; color:#475569; margin-top:1px; }
.hist-year { font-size:0.71rem; color:#94a3b8; margin-top:2px; font-weight:600; }
.hist-desc { font-size:0.78rem; color:#64748b; margin-top:4px; line-height:1.5; }
.hist-actions { display:flex; gap:2px; flex-shrink:0; margin-top:1px; }
.hist-btn { background:none; border:none; cursor:pointer; font-size:0.82rem; padding:3px 7px; border-radius:6px; color:#94a3b8; line-height:1; }
.hist-btn:hover { background:#f1f5f9; color:#374151; }
.hist-empty { font-size:0.82rem; color:#94a3b8; padding:0.25rem 0; }
.info-row { display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid #f1f5f9; font-size:0.85rem; }
.info-row:last-child { border-bottom:none; }
.info-row .label { color:#64748b; }
.info-row .value { font-weight:600; color:#0f172a; }
.skill-chip { background:#eff6ff; color:#1d4ed8; padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:600; display:inline-block; margin:3px; }
.resume-box { background:#f8fafc; border-radius:10px; padding:1rem; display:flex; align-items:center; justify-content:space-between; margin-top:0.5rem; }
.btn-dl { background:#2563eb; color:#fff; border:none; padding:0.4rem 1rem; border-radius:7px; font-size:0.78rem; font-weight:600; cursor:pointer; font-family:inherit; }

/* ── Applications ── */
.app-item { background:#fff; border-radius:12px; border:1.5px solid #e2e8f0; padding:1.2rem; margin-bottom:0.75rem; display:flex; gap:1rem; align-items:flex-start; transition:border-color 0.2s; }
.app-item:hover { border-color:#2563eb; }
.app-company-logo { width:44px; height:44px; border-radius:10px; background:linear-gradient(135deg,#2563eb,#7c3aed); display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.85rem; font-weight:800; flex-shrink:0; }
.app-info { flex:1; }
.app-title { font-size:0.92rem; font-weight:800; color:#0f172a; margin-bottom:0.2rem; }
.app-company { font-size:0.8rem; color:#64748b; margin-bottom:0.5rem; }
.app-meta { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
.status-badge { padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; }
.s-Applied { background:#eff6ff; color:#1d4ed8; }
.s-Viewed { background:#f5f3ff; color:#6d28d9; }
.s-Shortlisted { background:#fef3c7; color:#b45309; }
.s-Interview { background:#ecfeff; color:#0e7490; }
.s-Hired { background:#dcfce7; color:#15803d; }
.s-Rejected { background:#fef2f2; color:#b91c1c; }
.app-date { font-size:0.75rem; color:#94a3b8; }
.app-progress { display:flex; gap:0; margin-top:0.75rem; }
.prog-step { flex:1; text-align:center; position:relative; }
.prog-step::before { content:''; position:absolute; top:10px; left:50%; right:-50%; height:2px; background:#e2e8f0; z-index:0; }
.prog-step:last-child::before { display:none; }
.prog-dot { width:20px; height:20px; border-radius:50%; border:2px solid #e2e8f0; background:#fff; margin:0 auto 4px; position:relative; z-index:1; display:flex; align-items:center; justify-content:center; font-size:0.6rem; }
.prog-dot.done { background:#2563eb; border-color:#2563eb; color:#fff; }
.prog-dot.current { background:#fff; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.15); }
.prog-dot.rejected { background:#ef4444; border-color:#ef4444; color:#fff; }
.prog-label { font-size:0.62rem; color:#94a3b8; }
.prog-label.done { color:#2563eb; font-weight:600; }
.prog-label.current { color:#2563eb; font-weight:700; }
.btn-prep { background:#f5f3ff; color:#6d28d9; border:none; padding:0.35rem 0.8rem; border-radius:7px; font-size:0.75rem; font-weight:600; cursor:pointer; font-family:inherit; }

/* ── Notifications (popover items) ── */
.notif-item { background:#fff; border-radius:10px; border:1.5px solid #e2e8f0; padding:0.85rem 1rem; margin-bottom:0.45rem; display:flex; gap:0.75rem; align-items:flex-start; transition:all 0.15s; cursor:pointer; }
.notif-item:hover { border-color:#bfdbfe; background:#f8fbff; }
.notif-item.unread { border-color:#bfdbfe; background:#f0f7ff; }
.notif-icon { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
.ni-status { background:#eff6ff; }
.ni-shortlist { background:#fef3c7; }
.ni-interview { background:#ecfeff; }
.ni-hired { background:#dcfce7; }
.ni-rejected { background:#fef2f2; }
.notif-body { flex:1; min-width:0; }
.notif-msg { font-size:0.82rem; font-weight:600; color:#0f172a; margin-bottom:0.15rem; line-height:1.4; }
.notif-time { font-size:0.7rem; color:#94a3b8; }
.unread-dot { width:7px; height:7px; border-radius:50%; background:#2563eb; flex-shrink:0; margin-top:5px; }

/* ── Notification Popover ── */
.notif-backdrop { position:fixed; inset:0; z-index:399; display:none; }
.notif-backdrop.open { display:block; }
.notif-popover { position:fixed; top:50px; right:1rem; width:360px; max-height:480px; background:#fff; border-radius:14px; border:1.5px solid #e2e8f0; box-shadow:0 8px 32px rgba(0,0,0,0.15); z-index:400; display:none; flex-direction:column; overflow:hidden; }
.notif-popover.open { display:flex; }
.np-head { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1rem; border-bottom:1.5px solid #e2e8f0; flex-shrink:0; }
.np-head-title { font-size:0.88rem; font-weight:800; }
.np-mark-all { background:none; border:none; color:#2563eb; font-size:0.78rem; font-weight:600; cursor:pointer; font-family:inherit; }
.np-body { overflow-y:auto; padding:0.5rem; flex:1; -webkit-overflow-scrolling:touch; }
.np-empty { text-align:center; padding:2rem; color:#94a3b8; font-size:0.85rem; }

/* ── Interview Prep ── */
.prep-hero { background:linear-gradient(135deg,#4f46e5,#7c3aed); border-radius:14px; padding:1.5rem; color:#fff; margin-bottom:1.5rem; }
.prep-hero h2 { font-size:1.1rem; font-weight:800; margin-bottom:0.3rem; }
.prep-hero p { font-size:0.82rem; color:#ddd6fe; margin-bottom:1rem; }
.prep-ai-row { display:flex; gap:0.75rem; }
.prep-ai-row input { flex:1; padding:0.6rem 1rem; border-radius:8px; border:none; font-size:0.85rem; font-family:inherit; outline:none; }
.prep-ai-row button { background:#fff; color:#4f46e5; border:none; padding:0.6rem 1.2rem; border-radius:8px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
.prep-categories { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:1.5rem; }
.prep-cat { background:#fff; border-radius:12px; border:1.5px solid #e2e8f0; padding:1rem; text-align:center; cursor:pointer; transition:all 0.2s; }
.prep-cat:hover { border-color:#4f46e5; transform:translateY(-2px); box-shadow:0 4px 12px rgba(79,70,229,0.1); }
.prep-cat .cat-icon { font-size:1.5rem; margin-bottom:0.4rem; }
.prep-cat h4 { font-size:0.82rem; font-weight:700; margin-bottom:0.2rem; }
.prep-cat p { font-size:0.72rem; color:#64748b; }
.sal-neg-wrap { background:#fff; border-radius:14px; border:1.5px solid #e2e8f0; margin-top:1.25rem; overflow:hidden; }
.sal-neg-hd { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.25rem; }
.sal-neg-title { font-size:0.88rem; font-weight:800; color:#0f172a; }
.sal-neg-sub { font-size:0.75rem; color:#64748b; margin-top:2px; }
.sal-neg-btn { margin-left:auto; background:#16a34a; color:#fff; border:none; padding:0.5rem 1rem; border-radius:8px; font-size:0.82rem; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0; }
.sal-neg-btn:disabled { opacity:0.6; cursor:not-allowed; }
.sal-tip { display:flex; gap:10px; padding:0.65rem 0; border-bottom:1px solid #f1f5f9; font-size:0.84rem; line-height:1.6; color:#334155; }
.sal-tip:last-child { border-bottom:none; }
.sal-tip-num { background:#f0fdf4; color:#15803d; border-radius:50%; min-width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:800; flex-shrink:0; margin-top:2px; }
.qa-box { background:#fff; border-radius:14px; border:1.5px solid #e2e8f0; overflow:hidden; }
.qa-header { padding:1rem 1.2rem; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
.qa-header h3 { font-size:0.9rem; font-weight:800; }
.qa-item { padding:1rem 1.2rem; border-bottom:1px solid #f1f5f9; }
.qa-item:last-child { border-bottom:none; }
.qa-q { font-size:0.85rem; font-weight:700; color:#0f172a; margin-bottom:0.5rem; display:flex; gap:8px; }
.qa-q .q-num { background:#eff6ff; color:#2563eb; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.72rem; flex-shrink:0; }
.qa-a { font-size:0.82rem; color:#475569; line-height:1.6; padding-left:30px; display:none; }
.qa-item.open .qa-a { display:block; }
.qa-toggle { background:#f1f5f9; border:none; padding:4px 10px; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer; font-family:inherit; color:#64748b; margin-left:30px; margin-top:0.4rem; }
.ai-loading { color:#6d28d9; font-size:0.85rem; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Pro Plan sub-tabs ── */
.pro-tabs { display:flex; border-bottom:2px solid #e2e8f0; margin-bottom:1.25rem; background:#fff; border-radius:12px 12px 0 0; overflow:hidden; border:1.5px solid #e2e8f0; border-bottom:none; }
.pro-tab { flex:1; padding:0.85rem; font-size:0.85rem; font-weight:600; color:#64748b; border:none; background:none; cursor:pointer; font-family:inherit; border-bottom:3px solid transparent; transition:all 0.2s; }
.pro-tab.active { color:#2563eb; border-bottom-color:#2563eb; background:#f0f7ff; }

/* ── Profile Jobs Filter Bar ── */
.pjf-bar { display:flex; flex-wrap:wrap; gap:0.5rem; padding:0.75rem 0; margin-bottom:0.5rem; align-items:flex-start; }
.pjf-kw { flex:1; min-width:180px; border:1.5px solid #e2e8f0; border-radius:8px; padding:0.45rem 0.75rem; font-size:0.85rem; font-family:inherit; outline:none; }
.pjf-kw:focus { border-color:#3b82f6; }
.pjf-chips { display:flex; flex-wrap:wrap; gap:0.4rem; align-items:center; }
.pjf-fdd { position:relative; }
.pjf-chip { border:1.5px solid #e2e8f0; border-radius:20px; background:#fff; color:#374151; font-size:0.78rem; font-weight:600; padding:0.3rem 0.75rem; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all 0.15s; }
.pjf-chip:hover { border-color:#93c5fd; background:#eff6ff; }
.pjf-chip.pjf-chip-active { border-color:#2563eb; background:#eff6ff; color:#1d4ed8; }
.pjf-dd-panel { display:none; position:absolute; top:calc(100% + 6px); left:0; min-width:150px; background:#fff; border:1.5px solid #e2e8f0; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.1); z-index:200; padding:0.35rem; }
.pjf-fdd.open .pjf-dd-panel { display:block; }
.pjf-dd-opt { padding:0.4rem 0.75rem; border-radius:7px; font-size:0.82rem; cursor:pointer; color:#374151; }
.pjf-dd-opt:hover { background:#f1f5f9; }
.pjf-dd-opt.pjf-dd-opt-sel { background:#eff6ff; color:#1d4ed8; font-weight:600; }
.pjf-dd-panel label { display:flex; align-items:center; gap:6px; padding:0.4rem 0.75rem; border-radius:7px; font-size:0.82rem; cursor:pointer; color:#374151; }
.pjf-dd-panel label:hover { background:#f1f5f9; }

.pjf-mobile-btn { display:none; background:#2563eb; color:#fff; border:none; padding:0.45rem 1rem; border-radius:8px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; align-items:center; gap:6px; }
.pjf-mobile-badge { background:#fff; color:#2563eb; border-radius:8px; padding:1px 7px; font-size:0.7rem; font-weight:700; min-width:16px; display:inline-block; text-align:center; }

/* ── Drawer ── */
.drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:300; opacity:0; visibility:hidden; transition:opacity 0.28s,visibility 0.28s; }
.drawer-overlay.open { opacity:1; visibility:visible; }
.drawer { position:fixed; top:0; left:0; bottom:0; width:280px; background:#fff; z-index:301; transform:translateX(-100%); transition:transform 0.28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:4px 0 32px rgba(0,0,0,0.18); overflow:hidden; }
.drawer.open { transform:translateX(0); }
.dr-head { background:linear-gradient(135deg,#1e3a5f,#2563eb); padding:1.5rem 1.25rem 1.25rem; flex-shrink:0; }
.dr-head-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:0.75rem; }
.dr-avatar { width:66px; height:66px; border-radius:50%; border:3px solid rgba(255,255,255,0.35); background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:800; color:#fff; overflow:hidden; flex-shrink:0; }
.dr-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.dr-close { background:rgba(255,255,255,0.15); border:none; color:#fff; width:30px; height:30px; border-radius:8px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.dr-name { font-size:1rem; font-weight:800; color:#fff; margin-bottom:0.1rem; }
.dr-role { font-size:0.78rem; color:#bfdbfe; margin-bottom:0.75rem; }
.dr-score-row { display:flex; align-items:center; gap:8px; }
.dr-score-bar { flex:1; height:5px; background:rgba(255,255,255,0.2); border-radius:10px; overflow:hidden; }
.dr-score-fill { height:100%; background:#fff; border-radius:10px; width:0%; transition:width 0.8s ease; }
.dr-score-lbl { font-size:0.72rem; color:#bfdbfe; font-weight:600; white-space:nowrap; }
.dr-nav { flex:1; overflow-y:auto; padding:0.5rem 0; }
.dr-nav-item { display:flex; align-items:center; gap:0.75rem; padding:0.85rem 1.25rem; font-size:0.88rem; font-weight:600; color:#374151; text-decoration:none; border-left:3px solid transparent; transition:all 0.15s; }
.dr-nav-item:hover { background:#f8fafc; color:#2563eb; border-left-color:#bfdbfe; }
.dr-nav-item.active { background:#eff6ff; color:#2563eb; border-left-color:#2563eb; }
.dr-foot { padding:1rem 1.25rem; flex-shrink:0; display:flex; flex-direction:column; gap:0.5rem; border-top:1px solid #f1f5f9; }
.dr-edit-btn { background:#2563eb; color:#fff; border:none; border-radius:8px; padding:0.65rem; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; width:100%; }
.dr-logout-btn { background:none; color:#64748b; border:1.5px solid #e2e8f0; border-radius:8px; padding:0.55rem; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:inherit; width:100%; }
.dr-logout-btn:hover { border-color:#fecaca; color:#ef4444; }

@media(max-width:768px) {
  .pjf-kw, .pjf-chips { display:none !important; }
  .pjf-mobile-btn { display:inline-flex; }
  .notif-popover { width:calc(100% - 2rem); left:1rem; right:1rem; border-radius:0 0 14px 14px; }
}
@media(max-width:680px) { .profile-grid{grid-template-columns:1fr;} .prep-categories{grid-template-columns:1fr 1fr;} }
@media(max-width:640px) { .drawer { width:80vw; max-width:300px; } }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="tb-hamburger" onclick="openDrawer()" aria-label="Menu">&#9776;</button>
  <a href="/profile.html" class="tb-brand">Hire<span>Track</span></a>
  <button class="tb-bell" id="bell-btn" onclick="toggleNotifPanel()" aria-label="Notifications">🔔</button>
</div>
