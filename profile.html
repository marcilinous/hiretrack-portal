<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — HireTrack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar"></div>
<div class="page-hd"><h1>My Profile</h1><p>Manage your career profile and applications</p></div>
<div class="profile-wrap" id="profile-wrap">
  <aside class="profile-card">
    <div class="profile-avatar" id="avatar-initials">?</div>
    <div class="profile-name" id="p-name">—</div>
    <div class="profile-title" id="p-title">—</div>
    <div class="profile-info">
      <div class="pi-row"><span>📍 City</span><span id="p-city">—</span></div>
      <div class="pi-row"><span>📞 Mobile</span><span id="p-mobile">—</span></div>
      <div class="pi-row"><span>✉️ Email</span><span id="p-email" style="font-size:0.78rem;">—</span></div>
      <div class="pi-row"><span>🎓 Experience</span><span id="p-exp">—</span></div>
    </div>
    <div id="p-skills" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:1rem;"></div>
    <button class="btn-resume" id="resume-btn" onclick="downloadResume()" style="display:none;">📄 Download Resume</button>
    <button class="btn-resume" style="margin-top:0.5rem;background:#fee2e2;color:#b91c1c;" onclick="CandidateAuth.logout()">Logout</button>
  </aside>
  <div>
    <div class="apps-card">
      <h2>My Applications (<span id="apps-count">0</span>)</h2>
      <div id="apps-list"><div class="loading-spinner">Loading applications...</div></div>
    </div>
  </div>
</div>
<footer><p>© 2025 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('');
  const candidate = Session.getCandidate();
  if (!candidate) window.location.href = 'login.html';

  async function loadProfile() {
    const initials=candidate.name.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('avatar-initials').textContent=initials;
    document.getElementById('p-name').textContent=candidate.name;
    document.getElementById('p-title').textContent=candidate.jobtitle||'Job Seeker';
    document.getElementById('p-city').textContent=candidate.city||'—';
    document.getElementById('p-mobile').textContent=candidate.mobile||'—';
    document.getElementById('p-email').textContent=candidate.email||'—';
    document.getElementById('p-exp').textContent=candidate.experience||'—';
    if(candidate.skills?.length) document.getElementById('p-skills').innerHTML=candidate.skills.map(s=>`<span class="tag">${s}</span>`).join('');
    if(candidate.resume_data) document.getElementById('resume-btn').style.display='block';

    const apps = await ApplicationsDB.getCandidateApplications(candidate.id);
    document.getElementById('apps-count').textContent=apps.length;
    if(apps.length){
      const statusClass={Applied:'status-applied',Viewed:'status-viewed',Shortlisted:'status-shortlisted',Rejected:'status-rejected'};
      document.getElementById('apps-list').innerHTML=apps.map(a=>{
        const job=JOBS.find(j=>j.id===a.job_id);
        const date=new Date(a.applied_at).toLocaleDateString('en-IN');
        return `<div class="app-row"><div class="app-info"><h4>${job?job.title:'Job #'+a.job_id.slice(0,8)}</h4><p>${job?job.company+' · '+job.location:''} · Applied on ${date}</p></div><span class="status-badge ${statusClass[a.status]||'status-applied'}">${a.status}</span></div>`;
      }).join('');
    } else {
      document.getElementById('apps-list').innerHTML='<div class="empty-state"><div class="es-icon">📋</div><p>No applications yet.<br><a href="jobs.html" style="color:var(--blue);font-weight:600;">Browse jobs →</a></p></div>';
    }
  }

  function downloadResume() {
    if(!candidate.resume_data) return;
    const a=document.createElement('a'); a.href=candidate.resume_data; a.download=candidate.resume_name||'resume.pdf'; a.click();
  }

  loadProfile();
</script>
</body>
</html>
