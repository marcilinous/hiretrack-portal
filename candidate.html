<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Profile — HireTrack</title>
<meta name="description" content="View candidate profile on HireTrack.">
<meta name="robots" content="index, follow">

<meta property="og:type"        content="website">
<meta property="og:site_name"   content="HireTrack">
<meta property="og:title"       content="Candidate Profile — HireTrack">
<meta property="og:description" content="View candidate profile on HireTrack.">

<style>
body { padding-top: 64px; background: #f8fafc; }

.cp-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.cp-breadcrumb {
  font-size: 0.8rem;
  color: #94a3b8;
  margin-bottom: 1.5rem;
  display: flex;
  gap: 0.4rem;
  align-items: center;
  flex-wrap: wrap;
}
.cp-breadcrumb a { color: #3b82f6; text-decoration: none; }
.cp-breadcrumb a:hover { text-decoration: underline; }

/* ── Header card ── */
.cp-header-card {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  padding: 2rem;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: flex-start;
  gap: 1.5rem;
}

.cp-avatar {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #e2e8f0;
  flex-shrink: 0;
}

.cp-initials {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: -1px;
}

.cp-header-info { flex: 1; min-width: 0; }

.cp-name {
  font-size: 1.5rem;
  font-weight: 900;
  color: #0f172a;
  line-height: 1.2;
  margin-bottom: 0.25rem;
}

.cp-title {
  font-size: 0.97rem;
  font-weight: 700;
  color: #4f46e5;
  margin-bottom: 0.5rem;
}

.cp-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  font-size: 0.82rem;
  color: #64748b;
  margin-bottom: 0.75rem;
}

.cp-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: #f1f5f9;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #475569;
}

.cp-badge-boosted {
  background: linear-gradient(135deg,#fef3c7,#fde68a);
  color: #92400e;
}

.cp-actions {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

.cp-btn-primary {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 9px;
  padding: 0.55rem 1.2rem;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: opacity 0.15s;
}
.cp-btn-primary:hover { opacity: 0.87; }

.cp-btn-secondary {
  background: #f1f5f9;
  color: #374151;
  border: 1.5px solid #e2e8f0;
  border-radius: 9px;
  padding: 0.5rem 1.1rem;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: background 0.15s;
}
.cp-btn-secondary:hover { background: #e2e8f0; }

/* ── Info cards ── */
.cp-card {
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.25rem;
}

.cp-card-heading {
  font-size: 0.72rem;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.9rem;
}

.cp-about-text {
  font-size: 0.88rem;
  color: #334155;
  line-height: 1.7;
  white-space: pre-line;
}

.cp-skills-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.cp-skill {
  background: #eff6ff;
  color: #1d4ed8;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
}

.cp-pref-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem 1.5rem;
}

.cp-pref-item { }
.cp-pref-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 2px;
}
.cp-pref-value {
  font-size: 0.88rem;
  font-weight: 600;
  color: #0f172a;
}

/* ── Loading / error ── */
.cp-loading {
  text-align: center;
  padding: 3rem 1rem;
  color: #94a3b8;
  font-size: 0.9rem;
}

.cp-error {
  text-align: center;
  padding: 3rem 1rem;
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid #e2e8f0;
  color: #ef4444;
  font-size: 0.9rem;
}

@media (max-width: 600px) {
  .cp-header-card { flex-direction: column; gap: 1rem; align-items: center; text-align: center; }
  .cp-meta-row { justify-content: center; }
  .cp-actions { justify-content: center; }
  .cp-pref-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script src="app.js?v=4"></script>
<script>
document.getElementById('navbar').innerHTML = renderNavbar('');

(async function () {
  const params      = new URLSearchParams(window.location.search);
  const candidateId = params.get('id');
  const content     = document.getElementById('cp-content');

  if (!candidateId) {
    content.innerHTML = '<div class="cp-error">No candidate ID specified. <a href="/jobs.html">Browse jobs →</a></div>';
    return;
  }

  // Fetch public-safe fields only — no email, mobile, resume data
  const { data: c, error } = await sb
    .from('candidates')
    .select('id,name,jobtitle,city,experience,current_company,preferred_job_type,notice_period,expected_salary,about,skills,photo_url,created_at,boosted_until')
    .eq('id', candidateId)
    .single();

  if (error || !c) {
    content.innerHTML = '<div class="cp-error">Profile not found. <a href="/jobs.html">Browse jobs →</a></div>';
    return;
  }

  // Update page title and meta
  const displayName = c.name || 'Candidate';
  const jobTitle    = c.jobtitle || 'Job Seeker';
  document.title = `${displayName} — ${jobTitle} | HireTrack`;
  document.getElementById('bc-name').textContent = displayName;
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${displayName} — ${jobTitle} | HireTrack`);
  document.querySelector('meta[property="og:description"]').setAttribute('content', `${jobTitle}${c.city ? ` · ${c.city}` : ''}${c.experience ? ` · ${c.experience}` : ''} — View profile on HireTrack`);
  document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);

  // Avatar
  const initials  = displayName.split(' ').map(x => x[0]).join('').toUpperCase().slice(0, 2);
  const bgColors  = ['#2563eb','#7c3aed','#db2777','#059669','#d97706','#dc2626'];
  const bgColor   = bgColors[displayName.charCodeAt(0) % bgColors.length];
  const avatarHtml = c.photo_url
    ? `<img class="cp-avatar" src="${esc(c.photo_url)}" alt="${esc(displayName)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="cp-initials" style="background:${bgColor};display:none;">${initials}</div>`
    : `<div class="cp-initials" style="background:${bgColor};">${initials}</div>`;

  // Boost badge
  const isBoosted = c.boosted_until && new Date(c.boosted_until) > new Date();
  const boostedBadge = isBoosted
    ? `<span class="cp-badge cp-badge-boosted">⚡ Boosted Profile</span>`
    : '';

  // Meta chips
  const metaChips = [
    c.city          ? `<span class="cp-badge">📍 ${esc(c.city)}</span>` : '',
    c.experience    ? `<span class="cp-badge">🎓 ${esc(c.experience)}</span>` : '',
    c.current_company ? `<span class="cp-badge">🏢 ${esc(c.current_company)}</span>` : '',
    boostedBadge,
  ].filter(Boolean).join('');

  // Since year
  const sinceYear = c.created_at ? new Date(c.created_at).getFullYear() : null;

  // Chat / message button — only for logged-in employers
  const employer = Session.getEmployer?.();
  const messageBtn = employer
    ? `<button class="cp-btn-primary" onclick="startEmployerChat('${c.id}')">💬 Message</button>`
    : `<a href="/employer-auth.html" class="cp-btn-primary">💬 Message Candidate</a>`;

  // Skills
  const skills = Array.isArray(c.skills) ? c.skills : [];
  const skillsHtml = skills.length
    ? `<div class="cp-card">
        <div class="cp-card-heading">Skills</div>
        <div class="cp-skills-wrap">${skills.map(s => `<span class="cp-skill">${esc(s)}</span>`).join('')}</div>
       </div>`
    : '';

  // About
  const aboutHtml = c.about
    ? `<div class="cp-card">
        <div class="cp-card-heading">About</div>
        <div class="cp-about-text">${esc(c.about)}</div>
       </div>`
    : '';

  // Preferences
  const prefs = [
    { label: 'Job Type',      value: c.preferred_job_type },
    { label: 'Notice Period', value: c.notice_period },
    { label: 'Expected CTC',  value: c.expected_salary },
    { label: 'Location',      value: c.city },
  ].filter(p => p.value);

  const prefsHtml = prefs.length
    ? `<div class="cp-card">
        <div class="cp-card-heading">Job Preferences</div>
        <div class="cp-pref-grid">${prefs.map(p => `
          <div class="cp-pref-item">
            <div class="cp-pref-label">${p.label}</div>
            <div class="cp-pref-value">${esc(p.value)}</div>
          </div>`).join('')}
        </div>
       </div>`
    : '';

  content.innerHTML = `
    <div class="cp-header-card">
      ${avatarHtml}
      <div class="cp-header-info">
        <div class="cp-name">${esc(displayName)}</div>
        <div class="cp-title">${esc(jobTitle)}</div>
        <div class="cp-meta-row">${metaChips}</div>
        ${sinceYear ? `<div style="font-size:0.72rem;color:#94a3b8;margin-bottom:0.6rem;">On HireTrack since ${sinceYear}</div>` : ''}
        <div class="cp-actions">
          ${messageBtn}
          <button class="cp-btn-secondary" onclick="copyProfileLink()">🔗 Copy Link</button>
        </div>
      </div>
    </div>

    ${skillsHtml}
    ${aboutHtml}
    ${prefsHtml}

    <div style="text-align:center;padding:1.5rem;background:#f8fafc;border-radius:12px;border:1.5px dashed #e2e8f0;">
      <div style="font-size:0.85rem;color:#64748b;margin-bottom:0.75rem;">Looking to hire? Post a job on HireTrack.</div>
      <a href="/employer-auth.html" class="cp-btn-primary">Post a Job →</a>
    </div>
  `;
})();

function copyProfileLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('Profile link copied!');
  }).catch(() => {
    const el = document.createElement('input');
    el.value = window.location.href;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Profile link copied!');
  });
}

function startEmployerChat(candidateId) {
  // Navigate to employer dashboard chat with this candidate pre-selected
  window.location.href = `/employer-dashboard.html#chat?with=${candidateId}`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
