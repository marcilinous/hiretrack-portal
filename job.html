<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Dynamic meta — overwritten by JS once job is loaded -->
<title>Job Details — HireTrack</title>
<meta name="description" content="Find MIS, Data, Excel and SQL jobs in Karnataka on HireTrack.">
<meta name="robots" content="index, follow">

<!-- Open Graph -->
<meta property="og:type"        content="website">
<meta property="og:site_name"   content="HireTrack">
<meta property="og:url"         content="">
<meta property="og:title"       content="Job Details — HireTrack">
<meta property="og:description" content="Find MIS, Data, Excel and SQL jobs in Karnataka on HireTrack.">

<!-- Twitter card -->
<meta name="twitter:card"        content="summary">
<meta name="twitter:title"       content="Job Details — HireTrack">
<meta name="twitter:description" content="Find MIS, Data, Excel and SQL jobs in Karnataka on HireTrack.">

<!-- JSON-LD placeholder (replaced by JS) -->
<script id="ld-json" type="application/ld+json">{}</script>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<style>
body { padding-top: 64px; background: #f8fafc; }

.job-page-wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.job-breadcrumb {
  font-size: 0.8rem;
  color: #94a3b8;
  margin-bottom: 1.5rem;
  display: flex;
  gap: 0.4rem;
  align-items: center;
  flex-wrap: wrap;
}
.job-breadcrumb a { color: #3b82f6; text-decoration: none; }
.job-breadcrumb a:hover { text-decoration: underline; }

.job-card-main {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  padding: 2rem;
  margin-bottom: 1.5rem;
}

.job-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
}

.job-title-main {
  font-size: 1.5rem;
  font-weight: 800;
  color: #0f172a;
  line-height: 1.3;
}

.job-share-btn {
  background: #f1f5f9;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  padding: 0.4rem 0.85rem;
  font-size: 0.8rem;
  font-weight: 600;
  color: #374151;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
.job-share-btn:hover { background: #e2e8f0; }

.job-company-row {
  font-size: 1rem;
  color: #64748b;
  font-weight: 600;
  margin-bottom: 1rem;
}

.job-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
}
.job-chip {
  background: #f1f5f9;
  border-radius: 20px;
  padding: 0.3rem 0.85rem;
  font-size: 0.8rem;
  font-weight: 500;
  color: #374151;
}

.job-skills-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1.5rem;
}
.job-skill-tag {
  background: #eff6ff;
  color: #1d4ed8;
  border-radius: 20px;
  padding: 0.25rem 0.75rem;
  font-size: 0.78rem;
  font-weight: 600;
}

.job-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.5rem;
}

.job-description {
  font-size: 0.9rem;
  line-height: 1.8;
  color: #334155;
  white-space: pre-wrap;
  border-top: 1.5px solid #e2e8f0;
  padding-top: 1.25rem;
}

.job-actions-sticky {
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 16px;
  padding: 1.5rem;
  position: sticky;
  bottom: 1rem;
}

.job-actions-row {
  display: flex;
  gap: 0.75rem;
}
.job-actions-row .btn-apply {
  flex: 1;
  padding: 0.85rem;
  font-size: 0.95rem;
}
.job-actions-row .btn-whatsapp {
  padding: 0.85rem 1.25rem;
  font-size: 0.9rem;
}

.btn-wa-share {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  background: #f0fdf4;
  color: #16a34a;
  border: 1.5px solid #bbf7d0;
  border-radius: 10px;
  padding: 0.65rem;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin-top: 0.65rem;
  transition: background 0.15s;
}
.btn-wa-share:hover { background: #dcfce7; }

.job-status-badge {
  display: inline-block;
  background: #ecfdf5;
  color: #16a34a;
  border-radius: 8px;
  padding: 0.35rem 0.85rem;
  font-size: 0.82rem;
  font-weight: 700;
  margin-bottom: 0.75rem;
}

.job-loading {
  text-align: center;
  padding: 4rem 1rem;
  color: #94a3b8;
  font-size: 0.95rem;
}

.job-error {
  text-align: center;
  padding: 4rem 1rem;
  color: #ef4444;
}

@media (max-width: 640px) {
  .job-page-wrap { padding: 1.5rem 1rem 5rem; }
  .job-title-main { font-size: 1.2rem; }
  .job-card-main { padding: 1.25rem; }
  .job-actions-sticky { border-radius: 0; border-left: none; border-right: none; border-bottom: none; position: fixed; bottom: 0; left: 0; right: 0; }
  .similar-grid { grid-template-columns: 1fr !important; }
}

/* ── Similar Jobs ── */
.similar-wrap { margin-top: 1.5rem; margin-bottom: 1rem; }
.similar-label { font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.75rem; }
.similar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
.sj-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 1rem; text-decoration: none; display: block; transition: border-color 0.15s, box-shadow 0.15s; }
.sj-card:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(37,99,235,0.08); }
.sj-title { font-size: 0.85rem; font-weight: 700; color: #0f172a; margin-bottom: 0.2rem; line-height: 1.3; }
.sj-company { font-size: 0.76rem; color: #64748b; margin-bottom: 0.6rem; }
.sj-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.sj-chip { font-size: 0.68rem; background: #f1f5f9; color: #374151; border-radius: 20px; padding: 2px 8px; font-weight: 500; }
</style>
</head>
<body>
<div id="navbar"></div>

<div class="job-page-wrap">
  <div class="job-breadcrumb">
    <a href="/index.html">Home</a>
    <span>›</span>
    <a href="/jobs.html">Browse Jobs</a>
    <span>›</span>
    <span id="bc-title">Job Details</span>
  </div>

  <div id="job-content">
    <div class="job-loading">Loading job details…</div>
  </div>
  <div id="similar-jobs"></div>
</div>

<footer><p>© 2025 <span>HireTrack</span> — MIS & Data Jobs across Karnataka.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/sb-rest-shim.js"></script>
<script src="app.js?v=6"></script>
<script>
document.getElementById('navbar').innerHTML = renderNavbar('jobs');

(async function () {
  const params = new URLSearchParams(window.location.search);
  const jobId  = params.get('id');
  const content = document.getElementById('job-content');

  if (!jobId) {
    content.innerHTML = '<div class="job-error">No job ID specified. <a href="/jobs.html">Browse all jobs →</a></div>';
    return;
  }

  // Fetch job
  const { data: job, error } = await sb.from('jobs').select('*').eq('id', jobId).eq('delisted', false).single();

  if (error || !job) {
    content.innerHTML = '<div class="job-error">Job not found or no longer available. <a href="/jobs.html">Browse all jobs →</a></div>';
    return;
  }

  // ── Update meta tags ──
  const pageTitle = `${job.title} at ${job.company} — ${job.location} | HireTrack`;
  const pageDesc  = `${job.title} job at ${job.company} in ${job.location}. ${job.salary ? 'Salary: ' + job.salary + '. ' : ''}Apply on HireTrack.`;
  const pageUrl   = `https://www.hiretrack.co.in/job.html?id=${jobId}`;

  document.title = pageTitle;
  setMeta('name', 'description', pageDesc);
  setMeta('property', 'og:title', pageTitle);
  setMeta('property', 'og:description', pageDesc);
  setMeta('property', 'og:url', pageUrl);
  setMeta('name', 'twitter:title', pageTitle);
  setMeta('name', 'twitter:description', pageDesc);

  document.getElementById('bc-title').textContent = job.title;

  // ── JSON-LD JobPosting ──
  const skills = Array.isArray(job.skills)
    ? job.skills
    : (job.skills || '').split(',').map(s => s.trim()).filter(Boolean);

  // Build a substantive description (Google requires meaningful text)
  const descFull = job.description || [
    `${job.title} position at ${job.company}`,
    job.location   ? `located in ${job.location}`               : '',
    job.experience ? `Required experience: ${job.experience}`   : '',
    job.salary     ? `Salary: ${job.salary}`                    : '',
    skills.length  ? `Key skills: ${skills.join(', ')}`         : '',
    'Apply on HireTrack — India\'s growing job portal.',
  ].filter(Boolean).join('. ') + '.';

  const ld = {
    '@context':       'https://schema.org',
    '@type':          'JobPosting',
    title:            job.title,
    description:      descFull,
    identifier: {
      '@type': 'PropertyValue',
      name:  'HireTrack',
      value: String(job.id),
    },
    datePosted:       (job.posted_at || new Date().toISOString()).slice(0, 10),
    employmentType:   empType(job.job_type || job.type),
    directApply:      true,
    hiringOrganization: {
      '@type':  'Organization',
      name:     job.company,
      sameAs:   job.employer_id ? `https://www.hiretrack.co.in/employer.html?id=${job.employer_id}` : 'https://www.hiretrack.co.in',
    },
    jobLocation: {
      '@type': 'Place',
      address: {
        '@type':           'PostalAddress',
        addressLocality:   job.location || 'India',
        addressRegion:     'KA',
        addressCountry:    'IN',
      },
    },
    url: pageUrl,
    jobLocationType: (job.job_type || '').toLowerCase() === 'remote' ? 'TELECOMMUTE' : undefined,
  };

  // validThrough — only include when expiry is set
  if (job.expires_at) ld.validThrough = job.expires_at.slice(0, 10);

  // experienceRequirements
  if (job.experience) ld.experienceRequirements = { '@type': 'OccupationalExperienceRequirements', monthsOfExperience: parseExpMonths(job.experience) };

  // skills
  if (skills.length) ld.skills = skills.join(', ');

  // baseSalary — parse Indian salary strings into schema.org MonetaryAmount
  const salaryLd = parseSalaryLd(job.salary);
  if (salaryLd) {
    const qv = { '@type': 'QuantitativeValue', unitText: 'YEAR' };
    if (salaryLd.min != null) { qv.minValue = salaryLd.min; qv.maxValue = salaryLd.max; }
    else                        { qv.value = salaryLd.value; }
    ld.baseSalary = { '@type': 'MonetaryAmount', currency: 'INR', value: qv };
  }

  // BreadcrumbList
  const breadcrumbLd = {
    '@context': 'https://schema.org',
    '@type':    'BreadcrumbList',
    itemListElement: [
      { '@type': 'ListItem', position: 1, name: 'Home',        item: 'https://www.hiretrack.co.in/' },
      { '@type': 'ListItem', position: 2, name: 'Browse Jobs', item: 'https://www.hiretrack.co.in/jobs.html' },
      { '@type': 'ListItem', position: 3, name: job.title,     item: pageUrl },
    ],
  };

  document.getElementById('ld-json').textContent = JSON.stringify([ld, breadcrumbLd]);

  // ── Increment view count (fire-and-forget) ──
  if (job.employer_id) {
    sb.from('jobs').update({ views: (job.views || 0) + 1 }).eq('id', job.id).then(() => {});
    sb.from('job_views').insert([{ job_id: String(job.id), employer_id: String(job.employer_id) }]).then(() => {});
  }

  // ── Check application status ──
  const candidate = Session.getCandidate();
  let appStatus = null;
  if (candidate) {
    const { data: app } = await sb.from('applications').select('status').eq('candidate_id', candidate.id).eq('job_id', String(job.id)).maybeSingle();
    appStatus = app?.status || null;
  }

  // ── Render ──
  const expired = isJobExpired(job);
  const typeClass = {'Full Time':'badge-full','Contract':'badge-contract','Remote':'badge-remote'};
  const jobType   = job.job_type || job.type;
  const waMsg     = encodeURIComponent(`Hi, I found your job posting for *${job.title}* at *${job.company}* on HireTrack. I would like to apply.`);

  const chipsHtml = [
    job.location   ? `<span class="job-chip">📍 ${esc(job.location)}</span>`   : '',
    job.salary     ? `<span class="job-chip">💰 ${esc(job.salary)}</span>`     : '',
    job.experience ? `<span class="job-chip">🎯 ${esc(job.experience)}</span>` : '',
    jobType        ? `<span class="job-chip">${esc(jobType)}</span>`           : '',
    job.posted_at  ? `<span class="job-chip">🕒 ${timeAgoLocal(job.posted_at)}</span>` : '',
  ].join('');

  const skillsHtml = skills.length
    ? `<div class="job-skills-row">${skills.map(s => `<span class="job-skill-tag">${esc(s)}</span>`).join('')}</div>`
    : '';

  let actionHtml;
  if (expired) {
    actionHtml = `<button class="btn-apply expired-btn" disabled>⚠ Expired</button>`;
  } else if (!candidate) {
    actionHtml = `<button class="btn-apply" onclick="sessionStorage.setItem('redirect_after_login','${pageUrl}');window.location.href='login.html'">Sign in to apply</button>`;
  } else if (appStatus) {
    actionHtml = `<button class="btn-apply applied" disabled>✓ ${esc(appStatus)}</button>`;
  } else {
    actionHtml = `<button class="btn-apply" id="apply-btn" onclick="doApply()">Apply Now</button>`;
  }

  const waHtml = job.phone
    ? `<button class="btn-whatsapp" onclick="window.open('https://wa.me/91${job.phone}?text=${waMsg}','_blank')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.122 1.532 5.857L.057 23.925l6.235-1.635A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.659-.494-5.193-1.355l-.372-.22-3.7.971 1.008-3.573-.242-.383A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        WhatsApp</button>`
    : '';

  const saveBtnHtml = candidate
    ? `<button class="job-share-btn" id="job-save-btn" data-saved="" onclick="toggleSave()" style="min-width:72px;">🔖 Save</button>`
    : '';

  content.innerHTML = `
    <div class="job-card-main">
      <div class="job-title-row">
        <div class="job-title-main">${esc(job.title)}</div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          ${saveBtnHtml}
          <button class="job-share-btn" onclick="shareJob()">🔗 Share</button>
        </div>
      </div>
      <div class="job-company-row">🏢 ${esc(job.company)}${job.employer_id ? ` &nbsp;<a href="/employer.html?id=${job.employer_id}" style="font-size:0.78rem;color:#3b82f6;font-weight:600;text-decoration:none;" title="View all jobs from this employer">All jobs →</a>` : ''}</div>
      <div class="job-chips">${chipsHtml}</div>
      ${skillsHtml}
      ${job.description ? `<div class="job-section-label">Job Description</div><div class="job-description">${esc(job.description)}</div>` : ''}
    </div>

    <div class="job-actions-sticky">
      ${expired ? '<p style="color:#f59e0b;font-size:0.82rem;font-weight:600;margin:0 0 0.75rem;">⚠ This job listing has expired.</p>' : ''}
      <div class="job-actions-row">
        ${actionHtml}
        ${waHtml}
      </div>
      <button class="btn-wa-share" onclick="shareOnWhatsApp()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.122 1.532 5.857L.057 23.925l6.235-1.635A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.659-.494-5.193-1.355l-.372-.22-3.7.971 1.008-3.573-.242-.383A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        Share this job on WhatsApp
      </button>
      <p style="font-size:0.75rem;color:#94a3b8;margin:0.6rem 0 0;text-align:center;">
        Posted on <a href="https://www.hiretrack.co.in" style="color:#3b82f6;">HireTrack</a> — MIS &amp; Data jobs across Karnataka
      </p>
    </div>
  `;

  // ── Apply handler ──
  window.doApply = async function () {
    const btn = document.getElementById('apply-btn');
    if (!btn) return;
    btn.textContent = 'Applying…'; btn.disabled = true;
    const { data: existing } = await sb.from('applications').select('id').eq('candidate_id', candidate.id).eq('job_id', String(job.id)).maybeSingle();
    if (existing) { btn.textContent = '✓ Applied'; btn.classList.add('applied'); return; }
    const { error: err } = await sb.from('applications').insert([{ candidate_id: candidate.id, job_id: String(job.id), status: 'Applied' }]);
    if (!err) {
      btn.textContent = '✓ Applied'; btn.classList.add('applied');
      showToast('✅ Applied! Notifying employer…');
      if (job.email) {
        fetch('/api/email?action=notify-employer', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employerEmail: job.email, company: job.company, jobTitle: job.title, candidateName: candidate.name, candidateCity: candidate.city, candidateExperience: candidate.experience, candidateSkills: candidate.skills || [] })
        }).catch(() => {});
      }
    } else {
      btn.textContent = 'Apply Now'; btn.disabled = false;
      showToast('Failed. Please try again.');
    }
  };

  // ── Share handler ──
  window.shareJob = function () {
    if (navigator.share) {
      navigator.share({ title: pageTitle, url: pageUrl }).catch(() => {});
    } else {
      navigator.clipboard.writeText(pageUrl).then(() => showToast('Link copied!')).catch(() => {
        prompt('Copy this link:', pageUrl);
      });
    }
  };

  // ── WhatsApp share ──
  window.shareOnWhatsApp = function () {
    const text = `🔥 *${job.title}* at *${job.company}*${job.location ? '\n📍 ' + job.location : ''}${job.salary ? ' | 💰 ' + job.salary : ''}\n\nApply on HireTrack 👉 ${pageUrl}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  };

  // ── Save / bookmark ──
  if (candidate) {
    sb.from('saved_jobs').select('job_id')
      .eq('candidate_id', candidate.id).eq('job_id', String(job.id))
      .maybeSingle()
      .then(({ data }) => {
        const btn = document.getElementById('job-save-btn');
        if (btn && data) { btn.textContent = '🔖 Saved'; btn.dataset.saved = '1'; btn.style.color = '#2563eb'; }
      });
  }

  window.toggleSave = async function () {
    const btn = document.getElementById('job-save-btn');
    if (!btn || !candidate) return;
    btn.disabled = true;
    const isSaved = btn.dataset.saved === '1';
    if (isSaved) {
      await sb.from('saved_jobs').delete().eq('candidate_id', candidate.id).eq('job_id', String(job.id));
      btn.textContent = '🔖 Save'; btn.dataset.saved = ''; btn.style.color = '';
      showToast('Removed from saved jobs');
    } else {
      await sb.from('saved_jobs').insert([{ candidate_id: candidate.id, job_id: String(job.id) }]);
      btn.textContent = '🔖 Saved'; btn.dataset.saved = '1'; btn.style.color = '#2563eb';
      showToast('Saved! View in My Profile → Saved Jobs');
    }
    btn.disabled = false;
  };

  // ── Similar jobs (fire-and-forget after main render) ──
  (async function loadSimilarJobs() {
    const titleWords = job.title.split(/\s+/).filter(w => w.length > 2);
    if (!titleWords.length) return;

    const orFilter = titleWords.slice(0, 3).map(w => `title.ilike.%${w}%`).join(',');

    const { data: pool } = await sb
      .from('jobs')
      .select('id,title,company,location,salary,job_type,skills,expires_at,posted_at')
      .neq('id', job.id)
      .eq('delisted', false)
      .or(orFilter)
      .order('posted_at', { ascending: false })
      .limit(20);

    if (!pool?.length) return;

    const now = new Date();
    const jobSkillsLc = skills.map(s => s.toLowerCase());
    const jobLocRoot  = (job.location || '').split(',')[0].toLowerCase();

    const scored = pool
      .filter(j => !j.expires_at || new Date(j.expires_at) > now)
      .map(j => {
        const jSkills = Array.isArray(j.skills)
          ? j.skills
          : (j.skills || '').split(',').map(s => s.trim()).filter(Boolean);
        const skillScore = jSkills.filter(s => jobSkillsLc.includes(s.toLowerCase())).length;
        const locScore   = jobLocRoot && (j.location || '').toLowerCase().includes(jobLocRoot) ? 1 : 0;
        return { ...j, _skills: jSkills, _score: skillScore * 2 + locScore };
      })
      .sort((a, b) => b._score - a._score)
      .slice(0, 3);

    if (!scored.length) return;

    const el = document.getElementById('similar-jobs');
    if (!el) return;

    el.innerHTML = `
      <div class="similar-wrap">
        <div class="similar-label">Similar Jobs</div>
        <div class="similar-grid">
          ${scored.map(j => `
            <a href="/job.html?id=${j.id}" class="sj-card">
              <div class="sj-title">${esc(j.title)}</div>
              <div class="sj-company">🏢 ${esc(j.company)}${j.location ? ` · 📍 ${esc(j.location)}` : ''}</div>
              <div class="sj-chips">
                ${j.salary  ? `<span class="sj-chip">💰 ${esc(j.salary)}</span>`   : ''}
                ${j.job_type? `<span class="sj-chip">${esc(j.job_type)}</span>`    : ''}
                ${j._skills.slice(0, 2).map(s => `<span class="sj-chip">${esc(s)}</span>`).join('')}
              </div>
            </a>`).join('')}
        </div>
      </div>`;
  })();

})();

// ── Helpers ──
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setMeta(attr, name, content) {
  let el = document.querySelector(`meta[${attr}="${name}"]`);
  if (!el) { el = document.createElement('meta'); el.setAttribute(attr, name); document.head.appendChild(el); }
  el.setAttribute('content', content);
}

function timeAgoLocal(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return '1 day ago';
  if (days < 30) return `${days} days ago`;
  return new Date(isoStr).toLocaleDateString('en-IN');
}

function empType(t) {
  if (!t) return 'FULL_TIME';
  const m = { 'Full Time':'FULL_TIME', 'Part Time':'PART_TIME', 'Contract':'CONTRACTOR', 'Remote':'FULL_TIME', 'Hybrid':'FULL_TIME' };
  return m[t] || 'FULL_TIME';
}

function parseSalaryLd(salaryStr) {
  if (!salaryStr) return null;
  const s = salaryStr.replace(/[₹,\s]/g, '');
  // Range: "4-6LPA", "4L-6L", "4lpa-6lpa"
  const range = s.match(/^(\d+(?:\.\d+)?)[Ll]?(?:PA)?[-–](\d+(?:\.\d+)?)[Ll]?(?:PA)?$/i);
  if (range) return { min: parseFloat(range[1]) * 100000, max: parseFloat(range[2]) * 100000 };
  // Single: "5LPA", "5L"
  const single = s.match(/^(\d+(?:\.\d+)?)[Ll](?:PA)?$/i);
  if (single) return { value: parseFloat(single[1]) * 100000 };
  return null;
}

function parseExpMonths(expStr) {
  if (!expStr) return undefined;
  const s = expStr.toLowerCase();
  if (s.includes('fresher') || s.includes('0')) return 0;
  const m = s.match(/(\d+)\s*[-–+]?\s*(\d+)?\s*year/);
  if (m) return parseInt(m[1]) * 12;
  const mo = s.match(/(\d+)\s*month/);
  if (mo) return parseInt(mo[1]);
  return undefined;
}

function isJobExpired(job) {
  if (!job.expires_at) return false;
  return new Date() > new Date(job.expires_at);
}
