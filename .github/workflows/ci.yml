name: CI

on:
  push:
    branches: [main, 'claude/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  e2e:
    name: E2E Tests (public pages)
    runs-on: ubuntu-latest
    # Only run E2E on PRs targeting main, not on every feature-branch push
    if: github.event_name == 'pull_request'
    env:
      BASE_URL: ${{ vars.STAGING_URL || 'https://hiretrack.co.in' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run public-pages E2E tests
        run: npx playwright test tests/e2e/public-jobs.spec.js
        timeout-minutes: 5

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
