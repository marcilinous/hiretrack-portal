<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://www.hiretrack.co.in/reset-password.html">
<title>Reset Password — HireTrack</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="navbar"></div>
<div class="form-wrap" style="max-width:440px;">
  <div class="form-card">
    <h2>Reset Password</h2>
    <p class="sub">Choose a new password for your HireTrack account.</p>

    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="ok-msg"></div>

    <div id="reset-form">
      <div class="fg-form"><label>New Password *</label><input type="password" id="new-pwd" placeholder="At least 6 characters" /></div>
      <div class="fg-form"><label>Confirm Password *</label><input type="password" id="confirm-pwd" placeholder="Re-enter password" /></div>
      <button class="btn-primary" id="reset-btn" onclick="doReset()">Update Password</button>
    </div>

    <p class="form-switch"><a href="login.html">← Back to login</a></p>
  </div>
</div>
<footer><p>© <span id="copy-year">2026</span> <span>HireTrack</span> — Find Jobs Across India. Built with ❤️ in Bengaluru.</p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/sb-rest-shim.js"></script>
<script src="app.js?v=6"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('');
  // NOTE: no "redirect if logged in" guard here — opening the recovery link
  // establishes a (recovery) session, and we must stay on this page to use it.

  // app.js creates the Supabase client with detectSessionInUrl:true, so supabase-js
  // auto-parses the recovery hash on load and fires PASSWORD_RECOVERY. We listen for
  // it; updateUser() works against that recovery session — no manual hash parsing.
  let recoveryReady = false;
  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') recoveryReady = true;
  });

  // If the link is missing / invalid / expired, warn after the client has had a
  // moment to process the URL hash.
  setTimeout(async () => {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session && !recoveryReady) {
        const err = document.getElementById('err-msg');
        err.textContent = 'This reset link is invalid or has expired. Please request a new one from the login page.';
        err.style.display = 'block';
      }
    } catch (e) { /* non-fatal */ }
  }, 1200);

  async function doReset() {
    const pwd = document.getElementById('new-pwd').value;
    const pwd2 = document.getElementById('confirm-pwd').value;
    const err = document.getElementById('err-msg');
    const ok = document.getElementById('ok-msg');
    err.style.display = 'none'; ok.style.display = 'none';

    if (!pwd || pwd.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
    if (pwd !== pwd2) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }

    const btn = document.getElementById('reset-btn');
    btn.textContent = 'Updating...';
    btn.disabled = true;

    try {
      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) {
        const m = error.message || '';
        err.textContent = /session|jwt|token|auth|expired/i.test(m)
          ? 'Your reset link is invalid or has expired. Please request a new one from the login page.'
          : (m || 'Could not update password.');
        err.style.display = 'block';
        btn.textContent = 'Update Password';
        btn.disabled = false;
        return;
      }

      // Force a clean re-login with the new password (clears the recovery session).
      try { await sb.auth.signOut(); } catch (e) {}
      try { localStorage.removeItem('sb-pdjnpqyzayidthpfmvjk-auth-token'); } catch (e) {}
      Session.clearCandidate(); Session.clearEmployer();

      document.getElementById('reset-form').style.display = 'none';
      ok.textContent = '✅ Password updated! Redirecting to login…';
      ok.style.display = 'block';
      setTimeout(() => window.location.href = 'login.html?reset=success', 1500);
    } catch (e) {
      console.error('Reset password error:', e);
      err.textContent = e.message || 'Could not update password.';
      err.style.display = 'block';
      btn.textContent = 'Update Password';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
<script>(function(){var _cy=document.getElementById("copy-year");if(_cy)_cy.textContent=new Date().getFullYear();})();</script>
</body>
</html>
