<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — HireTrack</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.skill-chip { background:var(--gray2); border:1.5px solid var(--gray3); color:var(--gray5); font-size:0.82rem; padding:6px 14px; border-radius:20px; cursor:pointer; transition:all 0.18s; user-select:none; display:inline-flex; align-items:center; gap:4px; }
.skill-chip:hover { border-color:var(--blue); color:var(--blue); background:#eff6ff; }
.skill-chip.selected { background:var(--blue); color:#fff; border-color:var(--blue); }
.skill-chip.custom { background:var(--navy); color:#fff; border-color:var(--navy); }
.skill-chip.custom .remove-skill { opacity:0.7; font-size:0.9rem; cursor:pointer; }
</style>
</head>
<body>

<div id="navbar"></div>

<div class="form-wrap">
  <div class="form-card">
    <h2>Create Your Account</h2>
    <p class="sub">Join thousands of MIS & Data professionals on HireTrack</p>
    <div class="alert alert-error" id="err-msg"></div>

    <div class="form-row">
      <div class="fg-form">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="Sachin Kumar" />
      </div>
      <div class="fg-form">
        <label>Mobile Number *</label>
        <input type="tel" id="mobile" placeholder="9XXXXXXXXX" maxlength="10" />
      </div>
    </div>

    <div class="fg-form">
      <label>Email Address *</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="form-row">
      <div class="fg-form">
        <label>Current Job Title</label>
        <input type="text" id="jobtitle" placeholder="MIS Executive" />
      </div>
      <div class="fg-form">
        <label>Years of Experience *</label>
        <select id="experience">
          <option value="">Select</option>
          <option>Fresher (0–1 years)</option>
          <option>1–3 years</option>
          <option>3–5 years</option>
          <option>5+ years</option>
        </select>
      </div>
    </div>

    <div class="fg-form">
      <label>City *</label>
      <select id="city">
        <option value="">Select city</option>
        <option>Bengaluru</option>
        <option>Mysuru</option>
        <option>Mangaluru</option>
        <option>Hubballi</option>
        <option>Other Karnataka</option>
      </select>
    </div>

    <div class="fg-form">
      <label>Key Skills</label>
      <div id="skills-select" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
        <span class="skill-chip" onclick="toggleSkill(this)">Excel</span>
        <span class="skill-chip" onclick="toggleSkill(this)">SQL</span>
        <span class="skill-chip" onclick="toggleSkill(this)">Power BI</span>
        <span class="skill-chip" onclick="toggleSkill(this)">Python</span>
        <span class="skill-chip" onclick="toggleSkill(this)">MIS Reporting</span>
      </div>
    </div>

    <div class="fg-form">
      <label>Upload Resume (PDF only, max 2MB) *</label>
      <input type="file" id="resume" accept=".pdf" />
    </div>

    <div class="form-row">
      <div class="fg-form">
        <label>Password *</label>
        <input type="password" id="password" placeholder="Min 6 characters" />
      </div>
      <div class="fg-form">
        <label>Confirm Password *</label>
        <input type="password" id="confirm-password" placeholder="Repeat password" />
      </div>
    </div>

    <button class="btn-primary" id="signup-btn" onclick="doSignup()">Create Account</button>
    <p class="form-switch">Already have an account? <a href="login.html">Login here</a></p>
  </div>
</div>

<script src="app.js"></script>
<script>
  // STEP 2: Initialize Supabase
  const SB_URL = 'YOUR_SUPABASE_URL';
  const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

  document.getElementById('navbar').innerHTML = renderNavbar('');

  function toggleSkill(el) { el.classList.toggle('selected'); }

  async function doSignup() {
    const btn = document.getElementById('signup-btn');
    const errEl = document.getElementById('err-msg');
    const resumeFile = document.getElementById('resume').files[0];
    
    // Get all form data
    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const email = document.getElementById('email').value.trim();
    const jobtitle = document.getElementById('jobtitle').value.trim();
    const experience = document.getElementById('experience').value;
    const city = document.getElementById('city').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const skills = [...document.querySelectorAll('.skill-chip.selected')].map(s => s.innerText);

    // Validation
    if (!name || !email || !password || !resumeFile) {
        errEl.textContent = "Please fill all required fields and upload a resume.";
        errEl.style.display = "block";
        return;
    }
    if (password !== confirm) {
        errEl.textContent = "Passwords do not match.";
        errEl.style.display = "block";
        return;
    }

    btn.disabled = true;
    btn.textContent = "Processing...";

    try {
        // 1. Upload Resume to Storage Bucket
        const fileExt = resumeFile.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `resumes/${fileName}`;

        const { error: uploadError } = await supabaseClient.storage
            .from('resumes')
            .upload(filePath, resumeFile);

        if (uploadError) throw uploadError;

        // Get the Public URL for the resume
        const { data: { publicUrl } } = supabaseClient.storage
            .from('resumes')
            .getPublicUrl(filePath);

        // 2. Save Profile to Database
        const { error: dbError } = await supabaseClient
            .from('profiles')
            .insert([{
                full_name: name,
                mobile: mobile,
                email: email,
                job_title: jobtitle,
                experience: experience,
                city: city,
                skills: skills,
                resume_url: publicUrl,
                password: password // In a real app, use Supabase Auth for security
            }]);

        if (dbError) throw dbError;

        alert("Registration Successful!");
        window.location.href = "login.html";

    } catch (error) {
        errEl.textContent = error.message;
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Create Account";
    }
  }
</script>
</body>
</html>
